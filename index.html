<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo de Triunfo, Gloria y Esfuerzo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Inter',sans-serif;background:#0a0705;color:#f5ebd0;overflow-x:hidden;min-height:100vh}
.font-cinzel{font-family:'Cinzel',serif}
.golden-text{background:linear-gradient(90deg,#d4a843,#fff5cc,#d4a843,#fff5cc,#d4a843);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%,100%{background-position:-200% center}50%{background-position:200% center}}
.glass{background:rgba(30,22,12,0.8);backdrop-filter:blur(12px);border:1px solid rgba(212,168,67,0.12);border-radius:16px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0705}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.3);border-radius:3px}
input[type="date"]{color-scheme:dark}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes trophyShine{0%,100%{filter:brightness(1) drop-shadow(0 0 5px rgba(212,168,67,0.4))}50%{filter:brightness(1.35) drop-shadow(0 0 20px rgba(212,168,67,0.7))}}
.trophy-shine{animation:trophyShine 2s ease-in-out infinite}
@keyframes camFlash{0%{opacity:0}10%{opacity:1}100%{opacity:0}}
.cam-flash{position:fixed;inset:0;background:#fff;pointer-events:none;z-index:9999;animation:camFlash 0.7s ease-out forwards}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0%}to{width:100%}}}

/* ═══════════════════════════════════════════════════
   EFECTO 1: REVELACION CINEMATOGRAFICA
   ═══════════════════════════════════════════════════ */

.tarjeta-revelacion {position:relative;width:100%;max-width:540px;height:auto;min-height:420px;border-radius:20px;overflow:hidden;text-align:center;margin:0 auto;box-shadow:0 12px 48px rgba(0,0,0,0.6)}

/* FASE 0: CAPA DE OSCURIDAD ABSOLUTA */
.capa-oscuridad {position:absolute;inset:0;background:#050300;z-index:50;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1}
.tarjeta-revelacion.revealed .capa-oscuridad {animation:fadeOutDark 2.5s ease forwards;pointer-events:none}
@keyframes fadeOutDark {0%{opacity:1}100%{opacity:0}}

.punto-luz {position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(212,168,67,0.4);box-shadow:0 0 6px rgba(212,168,67,0.2);animation:puntoPulse 2s ease-in-out infinite}
@keyframes puntoPulse {0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(2.5)}}

.silueta-misterio {font-size:80px;opacity:0.3;filter:blur(1px);animation:siluetaFade 3s ease-in-out infinite}
@keyframes siluetaFade {0%,100%{opacity:0.2}50%{opacity:0.45}}

.texto-suspenso {font-family:'Cinzel',serif;font-size:15px;color:rgba(212,168,67,0.6);letter-spacing:4px;text-transform:uppercase;margin-top:24px;animation:textoSuspenso 2.5s ease-in-out infinite}
@keyframes textoSuspenso {0%,100%{opacity:0.4;letter-spacing:4px}50%{opacity:0.9;letter-spacing:7px}}

.puntos-animados::after {content:'';animation:puntosAnim 1.5s steps(4) infinite}
@keyframes puntosAnim {0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}

/* FASE 1: RAYOS DE LUZ DORADA */
.rayos-luz {position:absolute;inset:0;z-index:40;border-radius:20px;opacity:0}
.tarjeta-revelacion.revealed .rayos-luz {animation:rayosEntrar 2.5s ease-out forwards}

.rayo {position:absolute;top:50%;left:50%;width:2px;height:0;background:linear-gradient(to bottom,transparent,rgba(212,168,67,0.3),transparent);transform-origin:center top}
.tarjeta-revelacion.revealed .rayo {animation:rayoGrow 2s ease-out forwards}
.rayo:nth-child(1){transform:translate(-50%,0) rotate(-30deg);animation-delay:0.2s}
.rayo:nth-child(2){transform:translate(-50%,0) rotate(-15deg);animation-delay:0.4s}
.rayo:nth-child(3){transform:translate(-50%,0) rotate(0deg);animation-delay:0.1s}
.rayo:nth-child(4){transform:translate(-50%,0) rotate(15deg);animation-delay:0.5s}
.rayo:nth-child(5){transform:translate(-50%,0) rotate(30deg);animation-delay:0.3s}
.rayo:nth-child(6){transform:translate(-50%,0) rotate(-45deg);animation-delay:0.6s}
.rayo:nth-child(7){transform:translate(-50%,0) rotate(45deg);animation-delay:0.35s}

@keyframes rayosEntrar {0%{opacity:0}30%{opacity:0.8}100%{opacity:0.4}}
@keyframes rayoGrow {0%{height:0}100%{height:220px}}

/* FASE 2: DESTELLO CENTRAL */
.destello-central {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,67,0.8),rgba(212,168,67,0.3),transparent 70%);z-index:35;opacity:0}
.tarjeta-revelacion.revealed .destello-central {animation:destelloExpande 2s ease-out 0.3s forwards}
@keyframes destelloExpande {0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(3);opacity:1}60%{transform:translate(-50%,-50%) scale(8);opacity:0.6}100%{transform:translate(-50%,-50%) scale(15);opacity:0}}

/* FASE 3: CONTENIDO QUE EMERGE */
.contenido-revelado {display:none;flex-direction:column;justify-content:flex-start;align-items:center;padding:2.5rem 2rem 2rem;position:relative;z-index:30;background:linear-gradient(135deg,#1e1608,#2a1e0a);border:1px solid rgba(212,168,67,0.2);border-radius:20px;min-height:420px}
.tarjeta-revelacion.revealed .contenido-revelado {display:flex;animation:contenidoEmergencia 2s ease-out 0.8s forwards}
@keyframes contenidoEmergencia {0%{opacity:0;filter:brightness(0.1) blur(10px)}40%{opacity:0.5;filter:brightness(0.5) blur(5px)}100%{opacity:1;filter:brightness(1) blur(0)}}

/* FASE 4: BRILLO FINAL AURORA */
.aurora-brilho {position:absolute;inset:0;z-index:25;border-radius:20px;background:radial-gradient(ellipse at 50% 30%,rgba(212,168,67,0.15),transparent 60%);opacity:0}
.tarjeta-revelacion.revealed .aurora-brilho {animation:auroraAparece 3s ease-out 1s forwards}
@keyframes auroraAparece {0%{opacity:0}50%{opacity:1}100%{opacity:0.6}}

.nombre-brilho {position:relative}
.nombre-brilho::after {content:'';position:absolute;inset:-10px;background:radial-gradient(ellipse at center,rgba(212,168,67,0.2),transparent 70%);z-index:-1;opacity:0;border-radius:50%}
.tarjeta-revelacion.revealed .nombre-brilho::after {animation:brilhoNombre 2.5s ease-out 1.5s forwards}
@keyframes brilhoNombre {0%{opacity:0;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0.3;transform:scale(1)}}

.particula-sorteo {position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(212,168,67,0.6);z-index:45;opacity:0}
.tarjeta-revelacion.revealed .particula-sorteo {animation:particulaVuela 2.5s ease-out forwards}
@keyframes particulaVuela {0%{opacity:0;transform:translate(0,0) scale(0)}20%{opacity:1}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.5)}}

.mensaje-revelacion {position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:55;font-family:'Cinzel',serif;font-size:11px;color:rgba(212,168,67,0.35);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;transition:opacity 0.5s}
.tarjeta-revelacion.revealed .mensaje-revelacion {opacity:0}

.tarjeta-revelacion:not(.revealed):hover {animation:vibracionTarjeta 0.3s ease-in-out}
@keyframes vibracionTarjeta {0%,100%{transform:translateX(0)}20%{transform:translateX(-1px)}40%{transform:translateX(1px)}60%{transform:translateX(-1px)}80%{transform:translateX(1px)}}

.boton-revelar {background:linear-gradient(to right,#d4a843,#b8892a);color:#1a1410;padding:14px 36px;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;margin-top:24px;box-shadow:0 4px 12px rgba(212,168,67,0.3);transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.boton-revelar:hover {transform:translateY(-2px);box-shadow:0 6px 16px rgba(212,168,67,0.4)}
.boton-revelar:active {transform:translateY(1px)}

.boton-3d {background-color:#d4a843;color:#1a1410;padding:16px 40px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;box-shadow:0px 8px 0px #8a6a1f;transition:all 0.12s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.boton-3d:hover {transform:translateY(4px);box-shadow:0px 4px 0px #8a6a1f}
.boton-3d:active {transform:translateY(8px);box-shadow:0px 0px 0px #8a6a1f}

.boton-resplandor {background-color:transparent;color:#d4a843;padding:15px 40px;border:2px solid #d4a843;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:all 0.3s ease;font-family:'Cinzel',serif;letter-spacing:1px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.boton-resplandor:hover {background-color:rgba(212,168,67,0.15);color:#fff5cc;box-shadow:0 0 10px #d4a843,0 0 40px #d4a843,0 0 80px #d4a843;border-color:#fff5cc}

.resplandor-tarjeta {border:2px solid rgba(212,168,67,0.3);border-radius:16px;transition:all 0.3s ease}
.resplandor-tarjeta:hover {background-color:rgba(212,168,67,0.08);box-shadow:0 0 10px rgba(212,168,67,0.3),0 0 40px rgba(212,168,67,0.15),0 0 80px rgba(212,168,67,0.08)}

.footer-docente {position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,7,5,0.95);border-top:1px solid rgba(212,168,67,0.15);text-align:center;padding:12px 16px;font-family:'Cinzel',serif;font-size:11px;color:rgba(212,168,67,0.5);letter-spacing:1px}
.footer-docente strong {color:#d4a843}
.page-content {padding-bottom:50px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:0"></div>
<div id="app" class="page-content" style="position:relative;z-index:1"></div>
<div id="fallback-controls" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:10001;display:none;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;background:rgba(10,7,5,0.92);border:1px solid rgba(212,168,67,0.28);border-radius:14px;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,0.45)">
  <button id="fallback-reveal" type="button" style="padding:12px 18px;border-radius:10px;border:1px solid rgba(212,168,67,0.3);background:#d4a843;color:#1a1410;font-family:Cinzel,serif;font-weight:700;cursor:pointer">REVELAR</button>
  <button id="fallback-next" type="button" style="padding:12px 18px;border-radius:10px;border:1px solid rgba(96,165,250,0.35);background:rgba(59,130,246,0.18);color:#dbeafe;font-family:Cinzel,serif;font-weight:700;cursor:pointer">PRIMERA FECHA</button>
  <button id="fallback-next-2" type="button" style="padding:12px 18px;border-radius:10px;border:1px solid rgba(192,132,252,0.35);background:rgba(168,85,247,0.18);color:#f3e8ff;font-family:Cinzel,serif;font-weight:700;cursor:pointer">SEGUNDA FECHA</button>
</div>
<div class="footer-docente">D3magindesign @</div>

<script>
const SK='sorteo-triunfo-v2';
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function ld(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch(e){return null}}
function cl(){localStorage.removeItem(SK)}

let S=ld()||{scr:'setup',P:[],cfg:{f1:'',f2:'',tp:10,p1:1,p2:1,useF2:true},g1:[],g2:[],ri:0,rf:1,irv:false,em:'ind',nm:'',tp2:'ind',bt:'',btp:'ind',err:'',sc:true,showHelp:true};
function ps(){sv(S)}

function ol(p,t){if(p===1)return'PRIMER LUGAR';if(p===2)return'SEGUNDO LUGAR';if(p===3)return'TERCER LUGAR';if(p===t)return'Cierre de Presentaciones';return'Presentacion #'+p}
function ff(s){if(!s)return'Sin fecha';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short',year:'numeric'})}
function fff(s){if(!s)return'Sin fecha';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function gq(p,t){if(p===1)return'El esfuerzo constante forja la gloria eterna';if(p===2)return'La perseverancia es el camino hacia la excelencia';if(p===3)return'Cada paso adelante es una victoria sobre uno mismo';if(p===t)return'El cierre es solo el comienzo de una nueva era';return'El trabajo duro siempre encuentra su reconocimiento'}
function nc(i,n){const c=['#fca5a5','#fdba74','#fcd34d','#86efac','#67e8f9','#93c5fd','#c4b5fd','#f9a8d4','#fda4af','#bef264'];return c[Math.abs((i*7+n.length)%c.length)]}
function pb(t){const l=t.split('\n'),n=[];for(const ln of l){const tr=ln.trim();if(!tr)continue;if(tr.includes(','))n.push(...tr.split(',').map(s=>s.trim()).filter(s=>s));else n.push(tr)}return n.filter(s=>s.length>0)}
function cg(){return S.rf===1?S.g1:S.g2}
function cg2(){const g=cg();return g&&g.length>S.ri?g[S.ri]:null}

function mkp(){const c=document.getElementById('particles');c.innerHTML='';for(let i=0;i<18;i++){const d=document.createElement('div');d.style.cssText='position:absolute;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:3px;height:3px;border-radius:50%;background:rgba(212,168,67,'+(0.06+Math.random()*0.1)+');animation:float '+(3+Math.random()*4)+'s ease-in-out infinite;animation-delay:'+(Math.random()*3)+'s;';c.appendChild(d)}}

function fc(n,s){try{if(typeof confetti!=='function')return;confetti({particleCount:n||40,spread:s||70,origin:{y:0.6},colors:['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700'],disableForReducedMotion:true})}catch(e){}}
function fg(){try{if(typeof confetti!=='function')return;const e=Date.now()+3000,c=['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700','#daa520'];const f=()=>{try{confetti({particleCount:10,spread:130,origin:{y:0.5},colors:c,disableForReducedMotion:true})}catch(err){return}if(Date.now()<e)requestAnimationFrame(f)};f()}catch(e){}}

function rdr(){const a=document.getElementById('app');const s=S.scr;if(s==='setup')a.innerHTML=rs();else if(s==='sort')a.innerHTML=rsort();else if(s==='rev')a.innerHTML=rr();else if(s==='res')a.innerHTML=rres();mkp();updateFallbackControls()}

function vc(){const c=S.cfg;if(!c.f1){S.err='Selecciona la Fecha 1';return false}if(!c.f2){S.err='Selecciona la Fecha 2';return false}if(c.p1<1){S.err='Minimo 1 premiado Fecha 1';return false}if(c.p2<1){S.err='Minimo 1 premiado Fecha 2';return false}const t=c.p1+c.p2;if(t>S.P.length){S.err='Necesitas al menos '+t+' participantes';return false}return true}

function addI(){const n=S.nm.trim();if(!n){S.err='Ingresa el nombre';rdr();return}S.P.push({id:crypto.randomUUID(),n:n,t:S.tp2});S.nm='';S.err='';ps();rdr()}
function addB(){const ns=pb(S.bt);if(!ns.length){S.err='No se encontraron nombres';rdr();return}for(const n of ns)if(n)S.P.push({id:crypto.randomUUID(),n:n,t:S.btp});S.bt='';S.err='';ps();rdr()}
function rm(id){S.P=S.P.filter(p=>p.id!==id);ps();rdr()}
function uc(u){Object.assign(S.cfg,u);ps();rdr()}
function sm(s){S.scr=s;ps();rdr()}
function sem(m){S.em=m;S.err='';rdr()}
function stp(t){S.tp2=t;rdr()}
function sbtp(t){S.btp=t;rdr()}

function go(){if(!vc()){rdr();return}sm('sort');setTimeout(()=>{const sh=[...S.P];for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]]}const p2=S.cfg.useF2?S.cfg.p2:0;const a1=sh.slice(0,S.cfg.p1),a2=sh.slice(S.cfg.p1,S.cfg.p1+p2);S.g1=a1.map((p,i)=>({p:p,pos:i+1,lb:ol(i+1,a1.length)}));S.g2=S.cfg.useF2?a2.map((p,i)=>({p:p,pos:i+1,lb:ol(i+1,a2.length)})):[];S.ri=0;S.rf=1;S.irv=false;sm('rev')},4000)}

function rv(){if(S.irv)return;const g=cg2();if(!g){S.err='No hay ganador para revelar';rdr();return}S.irv=true;ps();var d=document.createElement('div');d.className='cam-flash';document.body.appendChild(d);setTimeout(function(){d.remove()},800);setTimeout(function(){if(g&&g.pos<=3)fc(80,100);else fc(35,60)},500);rdr()}

function nx(){var g=cg();if(!g||!g.length){sm('res');return}if(S.ri<g.length-1){S.ri++;S.irv=false}else if(S.rf===1&&S.g2.length>0){S.rf=2;S.ri=0;S.irv=false}else{sm('res');return}ps();rdr()}
function bindActionDelegates(){var h=function(ev){var b=ev.target.closest('button');if(!b)return;var oc=(b.getAttribute('onclick')||'').replace(/\s+/g,' ').trim();var act=(b.getAttribute('data-action')||'').trim();if(oc==='nx()'||act==='next'){ev.preventDefault();ev.stopPropagation();try{nx()}catch(e){console.error(e)}}else if(oc==='rv()'||act==='reveal'){ev.preventDefault();ev.stopPropagation();try{rv()}catch(e){console.error(e)}}};document.addEventListener('click',h,{capture:true});document.addEventListener('pointerup',h,{capture:true})}
function sk(){fg();sm('res')}
function rst(){S.scr='setup';S.g1=[];S.g2=[];S.ri=0;S.rf=1;S.irv=false;ps();rdr()}
function clr(){S={scr:'setup',P:[],cfg:{f1:'',f2:'',tp:10,p1:1,p2:1,useF2:true},g1:[],g2:[],ri:0,rf:1,irv:false,em:'ind',nm:'',tp2:'ind',bt:'',btp:'ind',err:'',sc:true,showHelp:true};cl();rdr()}

function rs(){
  var c=S.cfg,P=S.P,p2=c.useF2?c.p2:0,tt=c.p1+p2,fa=Math.max(0,tt-P.length),cG=P.filter(function(x){return x.t==='grupo'}).length,cI=P.filter(function(x){return x.t==='ind'}).length;
  var h='<div class="page-content" style="min-height:100vh;display:flex;flex-direction:column">';
  h+='<header style="position:relative;padding:24px 16px 16px;text-align:center"><div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(212,168,67,0.03),transparent)"></div>';
  h+='<div style="position:relative;z-index:10;animation:fadeUp 0.6s ease forwards"><div style="display:flex;justify-content:center;margin-bottom:12px"><i class="fas fa-trophy trophy-shine" style="font-size:52px;color:#d4a843"></i></div>';
  h+='<h1 class="font-cinzel golden-text" style="font-size:30px;font-weight:700;margin-bottom:4px">Sorteo de Triunfo</h1>';
  h+='<p style="color:rgba(212,168,67,0.45);font-size:13px;letter-spacing:1px;margin-bottom:14px">Una o dos fechas. Un solo destino de gloria.</p>';
  if(P.length>0||c.f1||c.f2)h+='<button onclick="if(confirm(&apos;Estas seguro de limpiar TODOS los datos?&apos;))clr()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:rgba(239,68,68,0.7);font-size:11px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background=&apos;rgba(239,68,68,0.15)&apos;;this.style.color=&apos;rgba(239,68,68,0.9)&apos;" onmouseout="this.style.background=&apos;rgba(239,68,68,0.08)&apos;;this.style.color=&apos;rgba(239,68,68,0.7)&apos;"><i class="fas fa-eraser"></i> Limpiar Todo</button>';
  h+='</div></header>';

    for(var i=0;i<f1.length;i++){
      var colors=['background:#d4a843;color:#1a1410','background:#a0a0a0;color:#1a1410','background:#b8762a;color:#fff','background:rgba(212,168,67,0.08);color:#d4a843;border:1px solid rgba(212,168,67,0.12)'];
      var sty=i<3?colors[i]:colors[3];
      var label=f1[i].p.n.length>8?f1[i].p.n.substring(0,7)+'..':f1[i].p.n;
      h+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0" title="'+f1[i].p.n+'"><div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;'+sty+'">'+(i+1)+'</div><span style="font-size:10px;color:rgba(212,168,67,0.4);white-space:nowrap;max-width:55px;overflow:hidden;text-overflow:ellipsis">'+label+'</span>'+(i<f1.length-1?'<div style="width:10px;height:1px;background:rgba(212,168,67,0.1)"></div>':'')+'</div>';
    }
    h+='</div></div>';
  }
  if(f2.length>0){
    h+='<div><p style="font-size:10px;color:rgba(212,168,67,0.4);margin-bottom:8px;font-family:Cinzel,serif">Fecha 2 &middot; '+fff(c.f2)+'</p><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px">';
    for(var i=0;i<f2.length;i++){
      var colors=['background:#d4a843;color:#1a1410','background:#a0a0a0;color:#1a1410','background:#b8762a;color:#fff','background:rgba(212,168,67,0.08);color:#d4a843;border:1px solid rgba(212,168,67,0.12)'];
      var sty=i<3?colors[i]:colors[3];
      var label=f2[i].p.n.length>8?f2[i].p.n.substring(0,7)+'..':f2[i].p.n;
      h+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0" title="'+f2[i].p.n+'"><div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;'+sty+'">'+(i+1)+'</div><span style="font-size:10px;color:rgba(212,168,67,0.4);white-space:nowrap;max-width:55px;overflow:hidden;text-overflow:ellipsis">'+label+'</span>'+(i<f2.length-1?'<div style="width:10px;height:1px;background:rgba(212,168,67,0.1)"></div>':'')+'</div>';
    }
    h+='</div></div>';
  }
  h+='</div>';

  h+='<div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;animation:fadeUp 0.5s ease forwards;animation-delay:0.6s">';
  h+='<button onclick="epdf()" class="boton-resplandor" style="width:100%;justify-content:center;padding:18px;font-size:14px"><i class="fas fa-file-pdf"></i> Generar PDF para Imprimir</button>';
  h+='<button onclick="rst()" style="width:100%;padding:14px;background:none;border:1px solid rgba(212,168,67,0.2);color:#d4a843;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px" onmouseover="this.style.background=&apos;rgba(212,168,67,0.08)&apos;" onmouseout="this.style.background=&apos;none&apos;"><i class="fas fa-rotate-left"></i> Nuevo Sorteo</button>';
  h+='<p style="text-align:center;font-size:11px;color:rgba(212,168,67,0.25);padding-bottom:8px"><button onclick="if(confirm(&apos;Limpiar TODO?&apos;))clr()" style="background:none;border:none;color:rgba(212,168,67,0.3);cursor:pointer;text-decoration:underline;transition:color 0.2s" onmouseover="this.style.color=&apos;rgba(212,168,67,0.5)&apos;" onmouseout="this.style.color=&apos;rgba(212,168,67,0.3)&apos;">Comenzar desde cero</button></p>';
  h+='</div>';

  h+='</main></div>';
  return h;
}

function epdf(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth(),M=18;
  var c=S.cfg,f1=S.g1,f2=S.g2;
  var al=[];for(var i=0;i<f1.length;i++)al.push(f1[i]);for(var i=0;i<f2.length;i++)al.push(f2[i]);
  doc.setFillColor(12,8,4);doc.rect(0,0,W,38,'F');
  doc.setDrawColor(212,168,67);doc.setLineWidth(1);doc.line(M,38,W-M,38);
  doc.setTextColor(212,168,67);doc.setFontSize(17);doc.setFont('helvetica','bold');
  doc.text('ORDEN DE PRESENTACION',W/2,14,{align:'center'});
  doc.setTextColor(200,180,140);doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Sorteo de Triunfo, Gloria y Esfuerzo',W/2,22,{align:'center'});
  var n=new Date();doc.setTextColor(140,120,90);doc.setFontSize(6.5);
  doc.text('Fecha: '+n.toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),W/2,32,{align:'center'});
  var y=48;doc.setFillColor(250,247,240);doc.setDrawColor(212,168,67);doc.roundedRect(M,y,W-M*2,14,2,2,'FD');
  doc.setTextColor(90,70,40);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
  doc.text('Fecha 1: '+c.f1+' | '+f1.length+' premiados',M+4,y+6);
  doc.text('Fecha 2: '+c.f2+' | '+f2.length+' premiados',M+4,y+12);
  doc.text('Total: '+al.length+' | Tiempo: '+(al.length*c.tp)+' min',W-M-4,y+9,{align:'right'});
  y=68;
  function mt(gs,fn,fs){
    if(y>250){doc.addPage();y=18}
    doc.setTextColor(212,168,67);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('FECHA '+fn+' - '+fs,M,y);
    var body=[];for(var i=0;i<gs.length;i++)body.push([''+(i+1),gs[i].p.n,gs[i].p.t==='grupo'?'Grupo':'Individual',c.tp+' min',gs[i].lb]);
    doc.autoTable({startY:y+4,head:[['#','Nombre / Grupo','Tipo','Tiempo','Orden']],body:body,theme:'plain',headStyles:{fillColor:[12,8,4],textColor:[212,168,67],fontStyle:'bold',fontSize:7.5,halign:'center',cellPadding:3},bodyStyles:{fontSize:7.5,cellPadding:3.5,textColor:[35,30,25]},columnStyles:{0:{halign:'center',cellWidth:10},1:{fontStyle:'bold'},2:{halign:'center',cellWidth:26},3:{halign:'center',cellWidth:20},4:{halign:'center',fontStyle:'italic'}},alternateRowStyles:{fillColor:[250,247,240]},margin:{left:M,right:M}});
    y=doc.lastAutoTable.finalY+8;
  }
  if(f1.length>0)mt(f1,1,c.f1);
  if(f2.length>0)mt(f2,2,c.f2);
  for(var i=1;i<=doc.internal.pages.length;i++){doc.setPage(i);var by=doc.internal.pageSize.getHeight()-10;doc.setDrawColor(212,168,67);doc.setLineWidth(0.5);doc.line(M,by-4,W-M,by-4);doc.setTextColor(130,115,85);doc.setFontSize(6);doc.text('Docente: Mg Mario Quiroz | Curso: Semiótica de la Imagen 2026 | Sorteo de Triunfo y Gloria',W/2,by,{align:'center'});}
  doc.save('sorteo-presentacion-'+new Date().toISOString().split('T')[0]+'.pdf');
}

function updateFallbackControls(){
  var box=document.getElementById('fallback-controls');
  var br=document.getElementById('fallback-reveal');
  var bn=document.getElementById('fallback-next');
  var b2=document.getElementById('fallback-next-2');
  if(!box||!br||!bn||!b2)return;
  if(S.scr!=='rev'){box.style.display='none';return}
  box.style.display='flex';
  br.style.display=S.irv?'none':'inline-flex';
  bn.style.display=S.irv?'inline-flex':'none';
  b2.style.display='none';
  var g=cg();
  var ls=g&&g.length?S.ri===g.length-1:false;
  var nf=S.rf===1&&S.g2.length>0;
  bn.textContent=ls?(nf?'SIGUIENTE FECHA':'VER RESULTADOS FINALES'):'SIGUIENTE GANADOR';
}
function bindFallbackControls(){
  var br=document.getElementById('fallback-reveal');
  var bn=document.getElementById('fallback-next');
  var b2=document.getElementById('fallback-next-2');
  if(br)br.onclick=function(ev){ev.preventDefault();try{rv()}catch(e){console.error(e)}};
  if(bn)bn.onclick=function(ev){ev.preventDefault();try{nx()}catch(e){console.error(e)}};
  if(b2)b2.onclick=function(ev){ev.preventDefault();try{nx()}catch(e){console.error(e)}};
}

mkp();bindFallbackControls();rdr();
