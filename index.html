<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo de Triunfo, Gloria y Esfuerzo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Inter',sans-serif;background:#0a0705;color:#f5ebd0;overflow-x:hidden;min-height:100vh}
.font-cinzel{font-family:'Cinzel',serif}

/* Golden text */
.golden-text{background:linear-gradient(90deg,#d4a843,#fff5cc,#d4a843,#fff5cc,#d4a843);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%,100%{background-position:-200% center}50%{background-position:200% center}}

/* Glass */
.glass{background:rgba(30,22,12,0.8);backdrop-filter:blur(12px);border:1px solid rgba(212,168,67,0.12);border-radius:16px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0705}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.3);border-radius:3px}
input[type="date"]{color-scheme:dark}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes trophyShine{0%,100%{filter:brightness(1) drop-shadow(0 0 5px rgba(212,168,67,0.4))}50%{filter:brightness(1.35) drop-shadow(0 0 20px rgba(212,168,67,0.7))}}
.trophy-shine{animation:trophyShine 2s ease-in-out infinite}
@keyframes camFlash{0%{opacity:0}10%{opacity:1}100%{opacity:0}}
.cam-flash{position:fixed;inset:0;background:#fff;pointer-events:none;z-index:9999;animation:camFlash 0.7s ease-out forwards}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0%}to{width:100%}}}

/* ════════════════════════════════════════════
   EFECTO 1: REVELACION MISTERIOSA
   ════════════════════════════════════════════ */
.tarjeta-revelacion {
  position: relative;
  width: 100%;
  max-width: 480px;
  min-height: 360px;
  border-radius: 16px;
  overflow: hidden;
  text-align: center;
  margin: 0 auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.contenido-oculto, .cubierta {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.6s ease;
  padding: 2rem;
}
.contenido-oculto {
  background: linear-gradient(135deg, #1e1608 0%, #2a1e0a 100%);
  color: #f5ebd0;
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 16px;
}
.cubierta {
  background: linear-gradient(135deg, #1a1410 0%, #2d2010 50%, #1a1410 100%);
  color: #d4a843;
  transform: translateY(0);
  border: 2px solid rgba(212,168,67,0.35);
  border-radius: 16px;
  cursor: pointer;
  z-index: 5;
}
/* Al pasar el cursor, la cubierta se desplaza hacia arriba */
.tarjeta-revelacion:hover .cubierta {
  transform: translateY(-100%);
}

/* ════════════════════════════════════════════
   EFECTO 2: BOTON 3D TACTIL
   ════════════════════════════════════════════ */
.boton-3d {
  background-color: #d4a843;
  color: #1a1410;
  padding: 16px 40px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  box-shadow: 0px 8px 0px #8a6a1f;
  transition: all 0.12s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
/* Efecto de presionado al pasar el cursor */
.boton-3d:hover {
  transform: translateY(4px);
  box-shadow: 0px 4px 0px #8a6a1f;
}
.boton-3d:active {
  transform: translateY(8px);
  box-shadow: 0px 0px 0px #8a6a1f;
}

/* ════════════════════════════════════════════
   EFECTO 3: RESPLANDOR LUMINOSO
   ════════════════════════════════════════════ */
.boton-resplandor {
  background-color: transparent;
  color: #d4a843;
  padding: 15px 40px;
  border: 2px solid #d4a843;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
/* El resplandor se activa al interactuar */
.boton-resplandor:hover {
  background-color: rgba(212, 168, 67, 0.15);
  color: #fff5cc;
  box-shadow: 0 0 10px #d4a843,
              0 0 40px #d4a843,
              0 0 80px #d4a843;
  border-color: #fff5cc;
}

/* Resplandor tarjeta */
.resplandor-tarjeta {
  border: 2px solid #d4a843;
  border-radius: 16px;
  transition: all 0.3s ease;
}
.resplandor-tarjeta:hover {
  background-color: rgba(212, 168, 67, 0.08);
  box-shadow: 0 0 10px #d4a843,
              0 0 40px rgba(212, 168, 67, 0.5),
              0 0 80px rgba(212, 168, 67, 0.2);
}

/* ════════════════════════════════════════════
   FOOTER DOCENTE - SIEMPRE VISIBLE
   ════════════════════════════════════════════ */
.footer-docente {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10, 7, 5, 0.95);
  border-top: 1px solid rgba(212,168,67,0.15);
  text-align: center;
  padding: 12px 16px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: rgba(212,168,67,0.5);
  letter-spacing: 1px;
}
.footer-docente strong {
  color: #d4a843;
  font-weight: 600;
}

/* Page container with footer padding */
.page-content {
  padding-bottom: 50px;
}
</style>
</head>
<body>

<!-- Ambient particles -->
<div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:0"></div>

<!-- Main app -->
<div id="app" class="page-content" style="position:relative;z-index:1"></div>

<!-- FOOTER DOCENTE - SIEMPRE VISIBLE EN TODAS LAS PANTALLAS -->
<div class="footer-docente">
  <strong>Docente:</strong> Mg Mario Quiroz &nbsp;|&nbsp; <strong>Curso:</strong> Semiotica de la Imagen &middot; 2026
</div>

<script>
// ═══════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════
const SK = 'sorteo-triunfo-v2';
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function ld(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch(e){return null}}
function cl(){localStorage.removeItem(SK)}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let S = ld() || {
  scr:'setup',P:[],cfg:{f1:'',f2:'',tp:10,p1:1,p2:1},
  g1:[],g2:[],ri:0,rf:1,irv:false,
  em:'ind',nm:'',tp2:'ind',bt:'',btp:'ind',err:'',sc:true
};
function ps(){sv(S)}

function ol(p,t){if(p===1)return'PRIMER LUGAR';if(p===2)return'SEGUNDO LUGAR';if(p===3)return'TERCER LUGAR';if(p===t)return'Cierre de Presentaciones';return'Presentacion #'+p}
function ff(s){if(!s)return'Sin fecha';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short',year:'numeric'})}
function fff(s){if(!s)return'Sin fecha';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function gq(p,t){if(p===1)return'El esfuerzo constante forja la gloria eterna';if(p===2)return'La perseverancia es el camino hacia la excelencia';if(p===3)return'Cada paso adelante es una victoria sobre uno mismo';if(p===t)return'El cierre es solo el comienzo de una nueva era';return'El trabajo duro siempre encuentra su reconocimiento'}
function pb(t){const l=t.split('\n'),n=[];for(const ln of l){const tr=ln.trim();if(!tr)continue;if(tr.includes(','))n.push(...tr.split(',').map(s=>s.trim()).filter(s=>s));else n.push(tr)}return n.filter(s=>s.length>0)}
function cg(){return S.rf===1?S.g1:S.g2}
function cg2(){const g=cg();return g[S.ri]}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
function mkp(){
  const c=document.getElementById('particles');
  c.innerHTML='';
  for(let i=0;i<18;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:3px;height:3px;border-radius:50%;background:rgba(212,168,67,${0.06+Math.random()*0.1});animation:float ${3+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*3}s;`;
    c.appendChild(d);
  }
}

// ═══════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════
function fc(n,s){confetti({particleCount:n||40,spread:s||70,origin:{y:0.6},colors:['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700'],disableForReducedMotion:true})}
function fg(){const e=Date.now()+3000,c=['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700','#daa520'];const f=()=>{confetti({particleCount:10,spread:130,origin:{y:0.5},colors:c,disableForReducedMotion:true});if(Date.now()<e)requestAnimationFrame(f)};f()}

// ═══════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════
function rdr(){const a=document.getElementById('app');const s=S.scr;if(s==='setup')a.innerHTML=rs();else if(s==='sort')a.innerHTML=rsort();else if(s==='rev')a.innerHTML=rr();else if(s==='res')a.innerHTML=rres();mkp()}

function vc(){
  const c=S.cfg;
  if(!c.f1){S.err='Selecciona la Fecha 1';return false}
  if(!c.f2){S.err='Selecciona la Fecha 2';return false}
  if(c.p1<1){S.err='Minimo 1 premiado Fecha 1';return false}
  if(c.p2<1){S.err='Minimo 1 premiado Fecha 2';return false}
  const t=c.p1+c.p2;
  if(t>S.P.length){S.err=`Necesitas al menos ${t} participantes`;return false}
  return true;
}

function addI(){const n=S.nm.trim();if(!n){S.err='Ingresa el nombre';rdr();return}S.P.push({id:crypto.randomUUID(),n:n,t:S.tp2});S.nm='';S.err='';ps();rdr()}
function addB(){const ns=pb(S.bt);if(!ns.length){S.err='No se encontraron nombres';rdr();return}for(const n of ns)if(n)S.P.push({id:crypto.randomUUID(),n:n,t:S.btp});S.bt='';S.err='';ps();rdr()}
function rm(id){S.P=S.P.filter(p=>p.id!==id);ps();rdr()}
function uc(u){Object.assign(S.cfg,u);ps();rdr()}
function sm(s){S.scr=s;ps();rdr()}
function sem(m){S.em=m;S.err='';rdr()}
function stp(t){S.tp2=t;rdr()}
function sbtp(t){S.btp=t;rdr()}

function go(){
  if(!vc()){rdr();return}
  sm('sort');
  setTimeout(()=>{
    const sh=[...S.P];
    for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]]}
    const a1=sh.slice(0,S.cfg.p1),a2=sh.slice(S.cfg.p1,S.cfg.p1+S.cfg.p2);
    S.g1=a1.map((p,i)=>({p:p,pos:i+1,lb:ol(i+1,a1.length)}));
    S.g2=a2.map((p,i)=>({p:p,pos:i+1,lb:ol(i+1,a2.length)}));
    S.ri=0;S.rf=1;S.irv=false;
    sm('rev');
  },4000);
}

function rv(){
  if(S.irv)return;
  S.irv=true;rdr();
  const d=document.createElement('div');d.className='cam-flash';document.body.appendChild(d);
  setTimeout(()=>d.remove(),800);
  setTimeout(()=>{const g=cg2();if(g&&g.pos<=3)fc(80,100);else fc(35,60)},500);
}

function nx(){
  const g=cg();
  if(S.ri<g.length-1){S.ri++;S.irv=false}
  else if(S.rf===1&&S.g2.length>0){S.rf=2;S.ri=0;S.irv=false}
  else{sm('res');return}
  ps();rdr();
}

function sk(){fg();sm('res')}
function rst(){S.scr='setup';S.g1=[];S.g2=[];S.ri=0;S.rf=1;S.irv=false;ps();rdr()}
function clr(){
  S={scr:'setup',P:[],cfg:{f1:'',f2:'',tp:10,p1:1,p2:1},g1:[],g2:[],ri:0,rf:1,irv:false,em:'ind',nm:'',tp2:'ind',bt:'',btp:'ind',err:'',sc:true};
  cl();rdr();
}

// ═══════════════════════════════════════════════════
//  RENDER: SETUP
// ═══════════════════════════════════════════════════
function rs(){
  const c=S.cfg,P=S.P,tt=c.p1+c.p2,fa=Math.max(0,tt-P.length),cG=P.filter(x=>x.t==='grupo').length,cI=P.filter(x=>x.t==='ind').length;
  return `
  <div class="page-content" style="min-height:100vh;display:flex;flex-direction:column">
    <header style="position:relative;padding:24px 16px 16px;text-align:center">
      <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(212,168,67,0.03),transparent)"></div>
      <div style="position:relative;z-index:10;animation:fadeUp 0.6s ease forwards">
        <div style="display:flex;justify-content:center;margin-bottom:12px"><i class="fas fa-trophy trophy-shine" style="font-size:52px;color:#d4a843"></i></div>
        <h1 class="font-cinzel golden-text" style="font-size:30px;font-weight:700;margin-bottom:4px">Sorteo de Triunfo</h1>
        <p style="color:rgba(212,168,67,0.45);font-size:13px;letter-spacing:1px;margin-bottom:14px">Dos fechas. Un solo destino de gloria.</p>
        ${(P.length>0||c.f1||c.f2)?`<button onclick="if(confirm('\u00bfEst\u00e1s seguro de limpiar TODOS los datos?'))clr()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:rgba(239,68,68,0.7);font-size:11px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(239,68,68,0.15)';this.style.color='rgba(239,68,68,0.9)'" onmouseout="this.style.background='rgba(239,68,68,0.08)';this.style.color='rgba(239,68,68,0.7)'"><i class="fas fa-eraser"></i> Limpiar Todo</button>`:''}
      </div>
    </header>

    <main style="flex-grow:1;padding:0 16px 60px;max-width:1100px;margin:0 auto;width:100%">
      <div style="display:grid;grid-template-columns:1fr;gap:16px">
        <!-- LEFT COLUMN -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;animation:fadeUp 0.6s ease forwards;animation-delay:0.15s">

          <!-- CONFIG -->
          <div class="glass" style="padding:20px">
            <button onclick="S.sc=!S.sc;ps();rdr()" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;color:#d4a843;cursor:pointer;margin-bottom:12px">
              <span class="font-cinzel" style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px"><i class="fas fa-cog"></i> Configuracion del Sorteo</span>
              <i class="fas fa-chevron-down" style="font-size:10px;transition:transform 0.3s;transform:rotate(${S.sc?180:0}deg)"></i>
            </button>
            ${S.sc?`
            <div style="display:flex;flex-direction:column;gap:12px">
              <div style="background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.1);border-radius:12px;padding:14px">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                  <span class="font-cinzel" style="width:24px;height:24px;border-radius:50%;background:rgba(212,168,67,0.15);color:#d4a843;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid rgba(212,168,67,0.25)">1</span>
                  <span style="font-size:12px;font-weight:600;color:#d4a843">Fecha de Presentacion 1</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                  <div><label style="font-size:10px;color:rgba(212,168,67,0.45);display:block;margin-bottom:3px">Fecha</label><input type="date" value="${c.f1}" onchange="uc({f1:this.value})" style="width:100%;height:34px;padding:0 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:8px;color:#f5ebd0;font-size:12px;outline:none"></div>
                  <div><label style="font-size:10px;color:rgba(212,168,67,0.45);display:block;margin-bottom:3px">Premiados</label><input type="number" min="1" max="50" value="${c.p1}" onchange="uc({p1:parseInt(this.value)||1})" style="width:100%;height:34px;padding:0 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:8px;color:#f5ebd0;font-size:12px;outline:none"></div>
                </div>
              </div>
              <div style="background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.1);border-radius:12px;padding:14px">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                  <span class="font-cinzel" style="width:24px;height:24px;border-radius:50%;background:rgba(212,168,67,0.15);color:#d4a843;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid rgba(212,168,67,0.25)">2</span>
                  <span style="font-size:12px;font-weight:600;color:#d4a843">Fecha de Presentacion 2</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                  <div><label style="font-size:10px;color:rgba(212,168,67,0.45);display:block;margin-bottom:3px">Fecha</label><input type="date" value="${c.f2}" onchange="uc({f2:this.value})" style="width:100%;height:34px;padding:0 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:8px;color:#f5ebd0;font-size:12px;outline:none"></div>
                  <div><label style="font-size:10px;color:rgba(212,168,67,0.45);display:block;margin-bottom:3px">Premiados</label><input type="number" min="1" max="50" value="${c.p2}" onchange="uc({p2:parseInt(this.value)||1})" style="width:100%;height:34px;padding:0 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:8px;color:#f5ebd0;font-size:12px;outline:none"></div>
                </div>
              </div>
              <div><label style="font-size:10px;color:rgba(212,168,67,0.45);display:block;margin-bottom:3px"><i class="fas fa-clock" style="font-size:9px;margin-right:4px"></i>Tiempo por presentacion (min)</label><input type="number" min="1" max="120" value="${c.tp}" onchange="uc({tp:parseInt(this.value)||10})" style="width:100%;height:34px;padding:0 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:8px;color:#f5ebd0;font-size:12px;outline:none"></div>
              <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;border:1px solid rgba(212,168,67,0.1)">
                <span style="color:rgba(212,168,67,0.5)">Total premiados: <strong style="color:#d4a843">${tt}</strong></span>
                ${fa>0?`<span style="color:#ef4444;font-size:10px">Faltan ${fa} participantes</span>`:(P.length>0?`<span style="color:#22c55e;font-size:10px">Listo para sortear</span>`:'')}
              </div>
            </div>`:''}
          </div>

          <!-- ADD PARTICIPANTS -->
          <div class="glass" style="padding:20px">
            <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;border:1px solid rgba(212,168,67,0.1);margin-bottom:16px">

    <div style="position:relative;z-index:10;text-align:center;max-width:400px;width:100%">
      <div style="animation:spin 3s linear infinite;margin-bottom:32px;display:inline-block"><i class="fas fa-trophy" style="font-size:60px;color:#d4a843;filter:drop-shadow(0 0 20px rgba(212,168,67,0.5))"></i></div>

        <div style="height:100%;background:linear-gradient(to right,#d4a843,#b8892a);border-radius:20px;width:0%;animation:progressFill 3.8s linear forwards"></div>
      </div>
      <p style="font-size:11px;color:rgba(212,168,67,0.3);margin-top:8px">Mezclando participantes...</p>
    </div>
    <script>(function(){const m=${JSON.stringify(msgs)};let i=0;const el=document.getElementById('smg');const iv=setInterval(()=>{i=(i+1)%m.length;if(el)el.textContent=m[i];},450);setTimeout(()=>clearInterval(iv),4000);})();<\/script>

}

  const bgs=['rgba(212,168,67,0.15)','rgba(160,160,160,0.08)','rgba(184,118,42,0.1)','rgba(212,168,67,0.05)','rgba(212,168,67,0.05)'];

  return `

    <div style="position:relative;z-index:10;text-align:center;width:100%;max-width:520px;animation:fadeUp 0.5s ease forwards">
      <div style="margin-bottom:16px">
        <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:11px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.15);color:#d4a843" class="font-cinzel"><i class="fas fa-calendar" style="font-size:10px"></i> Fecha de Presentacion ${S.rf}</span>
      </div>

      <div class="tarjeta-revelacion">

        <!-- CONTENIDO OCULTO (premio) -->
        <div class="contenido-oculto">
          <div style="margin-bottom:12px">
            <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:${bgs[pi]};border:2px solid ${t3?'rgba(212,168,67,0.4)':'rgba(212,168,67,0.1)'}">
              <i class="fas ${icons[pi]}" style="font-size:28px;color:${cols[pi]}"></i>

// ═══════════════════════════════════════════════════

function rres(){
  const c=S.cfg,f1=S.g1,f2=S.g2,al=[...f1,...f2],ttm=al.length*c.tp,cg2=al.filter(x=>x.p.t==='grupo').length,ci=al.filter(x=>x.p.t==='ind').length;
  const icn=['fa-crown','fa-trophy','fa-award'],bdg=['bg:#d4a843;color:#1a1410','bg:#a0a0a0;color:#1a1410','bg:#b8762a;color:#fff'],tcl=['color:#d4a843','color:#a0a0a0','color:#b8762a'];
  setTimeout(()=>fg(),300);

  function rgl(gs,fn,fs){
    return `
    <div style="margin-bottom:32px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="width:32px;height:32px;border-radius:50%;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.2);display:flex;align-items:center;justify-content:center;color:#d4a843;font-size:12px;font-weight:700" class="font-cinzel">${fn}</div>
        <div>
          <h3 class="font-cinzel" style="font-size:13px;font-weight:600;color:#d4a843">Fecha de Presentacion ${fn}</h3>

          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return `
  <div class="page-content" style="min-height:100vh;display:flex;flex-direction:column">

    <main style="flex-grow:1;padding:0 16px 60px;max-width:680px;margin:0 auto;width:100%">
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:24px;animation:fadeUp 0.5s ease forwards;animation-delay:0.1s">
        <div style="background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.08);border-radius:10px;padding:10px 16px;text-align:center">
          <p style="font-size:18px;font-weight:700;color:#d4a843">${al.length}</p><p style="font-size:9px;color:rgba(212,168,67,0.35);text-transform:uppercase;letter-spacing:1px">Premiados</p>
        </div>
        <div style="background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.08);border-radius:10px;padding:10px 16px;text-align:center">
          <p style="font-size:18px;font-weight:700;color:#d4a843">${f1.length}+${f2.length}</p><p style="font-size:9px;color:rgba(212,168,67,0.35);text-transform:uppercase;letter-spacing:1px">F1 + F2</p>
        </div>
        ${ci>0?`<div style="background:rgba(0,0,0,0.2);border:1px solid rgba(59,130,246,0.08);border-radius:10px;padding:10px 16px;text-align:center"><p style="font-size:18px;font-weight:700;color:#60a5fa">${ci}</p><p style="font-size:9px;color:rgba(96,165,250,0.4);text-transform:uppercase;letter-spacing:1px">Individuales</p></div>`:''}
        ${cg2>0?`<div style="background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.12);border-radius:10px;padding:10px 16px;text-align:center"><p style="font-size:18px;font-weight:700;color:#d4a843">${cg2}</p><p style="font-size:9px;color:rgba(212,168,67,0.35);text-transform:uppercase;letter-spacing:1px">Grupos</p></div>`:''}
        <div style="background:rgba(0,0,0,0.2);border:1px solid rgba(212,168,67,0.08);border-radius:10px;padding:10px 16px;text-align:center">
          <p style="font-size:18px;font-weight:700;color:#d4a843">${ttm}m</p><p style="font-size:9px;color:rgba(212,168,67,0.35);text-transform:uppercase;letter-spacing:1px">Duracion</p>
        </div>
      </div>

      ${f1.length>0?rgl(f1,1,c.f1):''}
      ${f1.length>0&&f2.length>0?`<div style="display:flex;align-items:center;gap:16px;margin:24px 0"><div style="flex:1;height:1px;background:rgba(212,168,67,0.08)"></div><div style="width:36px;height:36px;border-radius:50%;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.12);display:flex;align-items:center;justify-content:center"><i class="fas fa-chevron-right" style="color:rgba(212,168,67,0.4);font-size:12px"></i></div><div style="flex:1;height:1px;background:rgba(212,168,67,0.08)"></div></div>`:''}
      ${f2.length>0?rgl(f2,2,c.f2):''}

      <div class="glass" style="padding:20px;margin-top:24px;animation:fadeUp 0.5s ease forwards;animation-delay:0.5s">
        <h3 class="font-cinzel" style="font-size:13px;font-weight:600;color:#d4a843;margin-bottom:16px;display:flex;align-items:center;gap:8px"><i class="fas fa-timeline"></i> Resumen del Cronograma</h3>
        <div style="margin-bottom:16px">
          <p class="font-cinzel" style="font-size:10px;color:rgba(212,168,67,0.4);margin-bottom:8px">Fecha 1 &middot; ${fff(c.f1)}</p>
          <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px">
            ${f1.map((g,i)=>`<div style="display:flex;align-items:center;gap:6px;flex-shrink:0" title="${g.p.n}"><div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;${i===0?'background:#d4a843;color:#1a1410':i===1?'background:#a0a0a0;color:#1a1410':i===2?'background:#b8762a;color:#fff':'background:rgba(212,168,67,0.08);color:#d4a843;border:1px solid rgba(212,168,67,0.12)'}">${i+1}</div><span style="font-size:10px;color:rgba(212,168,67,0.4);white-space:nowrap;max-width:50px;overflow:hidden;text-overflow:ellipsis">${g.p.n.length>8?g.p.n.substring(0,7)+'...':g.p.n}</span>${i<f1.length-1?'<div style="width:12px;height:1px;background:rgba(212,168,67,0.1)"></div>':''}</div>`).join('')}
          </div>
        </div>
        <div>
          <p class="font-cinzel" style="font-size:10px;color:rgba(212,168,67,0.4);margin-bottom:8px">Fecha 2 &middot; ${fff(c.f2)}</p>
          <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px">
            ${f2.map((g,i)=>`<div style="display:flex;align-items:center;gap:6px;flex-shrink:0" title="${g.p.n}"><div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;${i===0?'background:#d4a843;color:#1a1410':i===1?'background:#a0a0a0;color:#1a1410':i===2?'background:#b8762a;color:#fff':'background:rgba(212,168,67,0.08);color:#d4a843;border:1px solid rgba(212,168,67,0.12)'}">${i+1}</div><span style="font-size:10px;color:rgba(212,168,67,0.4);white-space:nowrap;max-width:50px;overflow:hidden;text-overflow:ellipsis">${g.p.n.length>8?g.p.n.substring(0,7)+'...':g.p.n}</span>${i<f2.length-1?'<div style="width:12px;height:1px;background:rgba(212,168,67,0.1)"></div>':''}</div>`).join('')}

        </button>

// ═══════════════════════════════════════════════════
//  PDF EXPORT
// ═══════════════════════════════════════════════════
function epdf(){
  const {jsPDF}=window.jspdf,doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'}),W=doc.internal.pageSize.getWidth(),M=18,c=S.cfg,f1=S.g1,f2=S.g2,al=[...f1,...f2];
  doc.setFillColor(12,8,4);doc.rect(0,0,W,38,'F');
  doc.setDrawColor(212,168,67);doc.setLineWidth(1);doc.line(M,38,W-M,38);
  doc.setTextColor(212,168,67);doc.setFontSize(17);doc.setFont('helvetica','bold');
  doc.text('ORDEN DE PRESENTACION',W/2,14,{align:'center'});
  doc.setTextColor(200,180,140);doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Sorteo de Triunfo, Gloria y Esfuerzo',W/2,22,{align:'center'});
  const n=new Date();doc.setTextColor(140,120,90);doc.setFontSize(6.5);
  doc.text('Fecha: '+n.toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),W/2,32,{align:'center'});
  let y=48;doc.setFillColor(250,247,240);doc.setDrawColor(212,168,67);doc.roundedRect(M,y,W-M*2,14,2,2,'FD');
  doc.setTextColor(90,70,40);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
  doc.text('Fecha 1: '+c.f1+' | '+f1.length+' premiados',M+4,y+6);
  doc.text('Fecha 2: '+c.f2+' | '+f2.length+' premiados',M+4,y+12);
  doc.text('Total: '+al.length+' | Tiempo: '+(al.length*c.tp)+' min',W-M-4,y+9,{align:'right'});
  y=68;
  function mt(gs,fn,fs){
    if(y>250){doc.addPage();y=18}
    doc.setTextColor(212,168,67);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('FECHA '+fn+' - '+fs,M,y);
    doc.autoTable({startY:y+4,head:[['#','Nombre / Grupo','Tipo','Tiempo','Orden']],
      body:gs.map((g,i)=>[`${i+1}`,g.p.n,g.p.t==='grupo'?'Grupo':'Individual',c.tp+' min',g.lb]),
      theme:'plain',headStyles:{fillColor:[12,8,4],textColor:[212,168,67],fontStyle:'bold',fontSize:7.5,halign:'center',cellPadding:3},
      bodyStyles:{fontSize:7.5,cellPadding:3.5,textColor:[35,30,25]},
      columnStyles:{0:{halign:'center',cellWidth:10},1:{fontStyle:'bold'},2:{halign:'center',cellWidth:26},3:{halign:'center',cellWidth:20},4:{halign:'center',fontStyle:'italic'}},
      alternateRowStyles:{fillColor:[250,247,240]},margin:{left:M,right:M}});
    y=doc.lastAutoTable.finalY+8;
  }
  if(f1.length>0)mt(f1,1,c.f1);
  if(f2.length>0)mt(f2,2,c.f2);
  for(let i=1;i<=doc.internal.pages.length;i++){doc.setPage(i);const by=doc.internal.pageSize.getHeight()-10;doc.setDrawColor(212,168,67);doc.setLineWidth(0.5);doc.line(M,by-4,W-M,by-4);doc.setTextColor(130,115,85);doc.setFontSize(6);doc.text('Docente: Mg Mario Quiroz | Curso: Semi\u00f3tica de la Imagen 2026 | Sorteo de Triunfo y Gloria',W/2,by,{align:'center'});}
  doc.save('sorteo-presentacion-'+new Date().toISOString().split('T')[0]+'.pdf');
}

mkp();rdr();
</script>
