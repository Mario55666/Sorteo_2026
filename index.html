<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo de Triunfo, Gloria y Esfuerzo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { cinzel: ['Cinzel', 'serif'], inter: ['Inter', 'sans-serif'] },
      colors: {
        gold: { 50:'#fff9e6',100:'#fff0c2',200:'#ffe08a',300:'#d4a843',400:'#c49a3c',500:'#b8892a',600:'#8a6a1f',700:'#6b5218' },
        dark: { 50:'#2a2010',100:'#1e1608',200:'#1a1410',300:'#16100a',400:'#120c08',500:'#0e0a06' }
      }
    }
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0e0a06;color:#f5ebd0;overflow-x:hidden}
.font-cinzel{font-family:'Cinzel',serif}

/* Golden text */
.golden-text{background:linear-gradient(90deg,#d4a843,#fff5cc,#d4a843,#fff5cc,#d4a843);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%,100%{background-position:-200% center}50%{background-position:200% center}}

/* Glass */
.glass{background:rgba(30,22,12,0.75);backdrop-filter:blur(12px);border:1px solid rgba(212,168,67,0.12);border-radius:16px}

/* ═══ EFECTO 1: REVELACION MISTERIOSA ═══ */
.reveal-wrap{position:relative;width:100%;max-width:500px;min-height:340px;border-radius:20px;overflow:hidden;perspective:1000px;margin:0 auto}
.reveal-cover{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;background:linear-gradient(135deg,#1a1410,#2d2010,#1a1410);border:2px solid rgba(212,168,67,0.35);border-radius:20px;transition:transform 0.9s cubic-bezier(0.68,-0.55,0.265,1.55),opacity 0.5s ease;z-index:10;cursor:pointer}
.reveal-cover::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(circle at 50% 50%,rgba(212,168,67,0.08) 0%,transparent 70%)}
.reveal-wrap.revealed .reveal-cover{transform:translateY(-110%);opacity:0}
.reveal-prize{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1.5rem;background:linear-gradient(135deg,rgba(212,168,67,0.08),rgba(25,18,10,0.95));border:1px solid rgba(212,168,67,0.2);border-radius:20px}
.mystery-bounce{animation:mysteryBounce 2s ease-in-out infinite}
@keyframes mysteryBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(-5deg)}50%{transform:translateY(0) rotate(0deg)}75%{transform:translateY(-8px) rotate(5deg)}}

/* ═══ EFECTO 2: BOTON 3D TACTIL ═══ */
.btn-3d{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,#d4a843,#b8892a);color:#1a1410;padding:16px 32px;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:'Cinzel',serif;cursor:pointer;box-shadow:0 8px 0 #8a6a1f,0 10px 25px rgba(212,168,67,0.25);transition:all 0.12s ease;letter-spacing:0.5px;text-transform:uppercase;width:100%}
.btn-3d:hover{transform:translateY(4px);box-shadow:0 4px 0 #8a6a1f,0 6px 20px rgba(212,168,67,0.35)}
.btn-3d:active{transform:translateY(8px);box-shadow:0 0 0 #8a6a1f}
.btn-3d-sm{padding:12px 24px;font-size:12px;box-shadow:0 6px 0 #8a6a1f,0 8px 15px rgba(212,168,67,0.2)}
.btn-3d-sm:hover{transform:translateY(3px);box-shadow:0 3px 0 #8a6a1f}
.btn-3d-sm:active{transform:translateY(6px);box-shadow:0 0 0 #8a6a1f}

/* ═══ EFECTO 3: RESPLANDOR LUMINOSO ═══ */
.glow-box{padding:12px 20px;border:1.5px solid rgba(212,168,67,0.5);border-radius:14px;background:rgba(212,168,67,0.06);transition:all 0.4s ease}
.glow-box.active{background:rgba(212,168,67,0.18);border-color:#d4a843;box-shadow:0 0 10px rgba(212,168,67,0.3),0 0 40px rgba(212,168,67,0.2),0 0 80px rgba(212,168,67,0.08),inset 0 0 30px rgba(212,168,67,0.04);animation:glowPulse 2s ease-in-out infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(212,168,67,0.3),0 0 40px rgba(212,168,67,0.15),0 0 80px rgba(212,168,67,0.06),inset 0 0 20px rgba(212,168,67,0.03)}50%{box-shadow:0 0 20px rgba(212,168,67,0.5),0 0 60px rgba(212,168,67,0.3),0 0 120px rgba(212,168,67,0.12),inset 0 0 40px rgba(212,168,67,0.07)}}

/* Trophy shine */
@keyframes trophyShine{0%,100%{filter:brightness(1) drop-shadow(0 0 5px rgba(212,168,67,0.4))}50%{filter:brightness(1.35) drop-shadow(0 0 20px rgba(212,168,67,0.7))}}
.trophy-shine{animation:trophyShine 2s ease-in-out infinite}

/* Camera flash */
@keyframes camFlash{0%{opacity:0}10%{opacity:1}100%{opacity:0}}
.cam-flash{position:fixed;inset:0;background:#fff;pointer-events:none;z-index:9999;animation:camFlash 0.7s ease-out forwards}

/* Spotlight bg */
@keyframes focusSpot{0%,100%{background:radial-gradient(circle at 50% 50%,rgba(212,168,67,0.12) 0%,rgba(14,10,6,0.97) 55%)}50%{background:radial-gradient(circle at 50% 50%,rgba(212,168,67,0.22) 0%,rgba(14,10,6,0.94) 50%)}}
.spot-bg{animation:focusSpot 3s ease-in-out infinite}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{0%{transform:scale(2.5);opacity:0;filter:blur(8px)}60%{transform:scale(1.1);opacity:1;filter:blur(0)}100%{transform:scale(1);opacity:1;filter:blur(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0%}to{width:100%}}

.animate-fadeUp{animation:fadeUp 0.6s ease forwards}
.animate-scaleIn{animation:scaleIn 0.5s ease forwards}
.animate-slideInLeft{animation:slideInLeft 0.5s ease forwards}
.animate-count{animation:countUp 0.7s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
.animate-spin-slow{animation:spin 3s linear infinite}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0e0a06}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.3);border-radius:3px}

/* Inputs */
input[type="date"]{color-scheme:dark}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
</style>
</head>
<body class="min-h-screen relative">

<!-- Ambient particles -->
<div class="fixed inset-0 pointer-events-none z-0" id="particles"></div>

<!-- Main app -->
<div id="app" class="relative z-10"></div>

<script>
// ═══════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'sorteo-triunfo-gloria';
function save(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }
function load() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function clear() { localStorage.removeItem(STORAGE_KEY); }

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = load() || {
  screen: 'setup',
  participantes: [],
  config: { fecha1: '', fecha2: '', tiempoPorPresentacion: 10, premiadosFecha1: 1, premiadosFecha2: 1 },
  f1Ganadores: [],
  f2Ganadores: [],
  revealIdx: 0,
  revealFecha: 1,
  entryMode: 'individual',
  nombre: '', tipo: 'individual', fecha: '', tiempo: '10',
  bulkText: '', bulkTipo: 'individual', bulkFecha: '', bulkTiempo: '10',
  error: '',
  showConfig: true,
  isRevealed: false
};

function persist() { save(state); }

function getOrderLabel(pos, total) {
  if (pos === 1) return 'PRIMER LUGAR';
  if (pos === 2) return 'SEGUNDO LUGAR';
  if (pos === 3) return 'TERCER LUGAR';
  if (pos === total) return 'Cierre de Presentaciones';
  return 'Presentacion #' + pos;
}

function formatFecha(fechaStr) {
  if (!fechaStr) return 'Sin fecha';
  const d = new Date(fechaStr + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
}

function formatFechaFull(fechaStr) {
  if (!fechaStr) return 'Sin fecha';
  const d = new Date(fechaStr + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
function createParticles() {
  const c = document.getElementById('particles');
  c.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'absolute w-1 h-1 rounded-full';
    d.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;background:rgba(212,168,67,${0.1+Math.random()*0.15});animation:float ${3+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*3}s;`;
    c.appendChild(d);
  }
  const bg = document.createElement('div');
  bg.className = 'absolute inset-0';
  bg.style.cssText = 'background:radial-gradient(ellipse at 50% 0%, rgba(212,168,67,0.03) 0%, transparent 60%);';
  c.appendChild(bg);
}

// ═══════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════
function fireConfetti(intensity) {
  const configs = { low: [20,50], medium: [50,80], high: [100,120] };
  const [pc, sp] = configs[intensity] || configs.medium;
  confetti({ particleCount: pc, spread: sp, origin: { y: 0.6 }, colors: ['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700'], disableForReducedMotion: true });
}
function fireGrandFinale() {
  const end = Date.now() + 3000;
  const colors = ['#d4a843','#fff5cc','#e8c868','#b8860b','#ffd700','#daa520'];
  const frame = () => { confetti({ particleCount: 10, spread: 130, origin: { y: 0.5 }, colors, disableForReducedMotion: true }); if (Date.now() < end) requestAnimationFrame(frame); };
  frame();
}

// ═══════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════
function setScreen(s) { state.screen = s; render(); persist(); }
function setEntryMode(m) { state.entryMode = m; state.error = ''; render(); }
function setError(e) { state.error = e; render(); }
function setShowConfig(v) { state.showConfig = v; render(); }

function addIndividual() {
  const n = state.nombre.trim();
  if (!n) { setError('Ingresa el nombre'); return; }
  state.participantes.push({ id: crypto.randomUUID(), nombre: n, tipo: state.tipo });
  state.nombre = ''; state.error = ''; persist(); render();
}
function addBulk() {
  const text = state.bulkText.trim();
  if (!text) { setError('Ingresa al menos un nombre'); return; }
  const lines = text.split('\n');
  const names = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (t.includes(',')) names.push(...t.split(',').map(s => s.trim()).filter(s => s));
    else names.push(t);
  }
  if (names.length === 0) { setError('No se encontraron nombres validos'); return; }
  for (const n of names) {
    if (n.trim()) state.participantes.push({ id: crypto.randomUUID(), nombre: n.trim(), tipo: state.bulkTipo });
  }
  state.bulkText = ''; state.error = ''; persist(); render();
}
function removeParticipant(id) {
  state.participantes = state.participantes.filter(p => p.id !== id);
  persist(); render();
}
function updateConfig(upd) {
  Object.assign(state.config, upd);
  persist(); render();
}
function validateConfig() {
  const c = state.config;
  if (!c.fecha1) { setError('Selecciona la Fecha de Presentacion 1'); return false; }
  if (!c.fecha2) { setError('Selecciona la Fecha de Presentacion 2'); return false; }
  if (c.premiadosFecha1 < 1) { setError('Minimo 1 premiado Fecha 1'); return false; }
  if (c.premiadosFecha2 < 1) { setError('Minimo 1 premiado Fecha 2'); return false; }
  const total = c.premiadosFecha1 + c.premiadosFecha2;
  if (total > state.participantes.length) { setError(`Necesitas al menos ${total} participantes`); return false; }
  return true;
}
function iniciarSorteo() {
  if (!validateConfig()) return;
  setScreen('sorting');
  setTimeout(() => {
    const shuffled = [...state.participantes];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const f1 = shuffled.slice(0, state.config.premiadosFecha1);
    const f2 = shuffled.slice(state.config.premiadosFecha1, state.config.premiadosFecha1 + state.config.premiadosFecha2);
    state.f1Ganadores = f1.map((p, i) => ({ participante: p, posicion: i+1, orderLabel: getOrderLabel(i+1, f1.length) }));
    state.f2Ganadores = f2.map((p, i) => ({ participante: p, posicion: i+1, orderLabel: getOrderLabel(i+1, f2.length) }));
    state.revealIdx = 0; state.revealFecha = 1; state.isRevealed = false;
    setScreen('reveal');
  }, 4000);
}
function reveal() {
  if (state.isRevealed) return;
  state.isRevealed = true;
  render();
  setTimeout(() => {
    const g = getCurrentGanador();
    if (g && g.posicion <= 3) fireConfetti('high');
    else fireConfetti('medium');
  }, 400);
}
function nextReveal() {
  const ganadores = state.revealFecha === 1 ? state.f1Ganadores : state.f2Ganadores;
  if (state.revealIdx < ganadores.length - 1) {
    state.revealIdx++; state.isRevealed = false;
  } else if (state.revealFecha === 1 && state.f2Ganadores.length > 0) {
    state.revealFecha = 2; state.revealIdx = 0; state.isRevealed = false;
  } else {
    setScreen('results'); return;
  }
  persist(); render();
}
function skipToResults() { fireGrandFinale(); setScreen('results'); }
function reset() {
  state.screen = 'setup'; state.f1Ganadores = []; state.f2Ganadores = [];
  state.revealIdx = 0; state.revealFecha = 1; state.isRevealed = false;
  persist(); render();
}
function clearAll() {
  state = {
    screen: 'setup', participantes: [],
    config: { fecha1: '', fecha2: '', tiempoPorPresentacion: 10, premiadosFecha1: 1, premiadosFecha2: 1 },
    f1Ganadores: [], f2Ganadores: [], revealIdx: 0, revealFecha: 1,
    entryMode: 'individual', nombre: '', tipo: 'individual', fecha: '', tiempo: '10',
    bulkText: '', bulkTipo: 'individual', bulkFecha: '', bulkTiempo: '10',
    error: '', showConfig: true, isRevealed: false
  };
  clear(); render();
}
function getCurrentGanador() {
  const ganadores = state.revealFecha === 1 ? state.f1Ganadores : state.f2Ganadores;
  return ganadores[state.revealIdx];
}

// ═══════════════════════════════════════════════════
//  RENDER SCREENS
// ═══════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const s = state.screen;
  if (s === 'setup') app.innerHTML = renderSetup();
  else if (s === 'sorting') app.innerHTML = renderSorting();
  else if (s === 'reveal') app.innerHTML = renderReveal();
  else if (s === 'results') app.innerHTML = renderResults();
  createParticles();
}

function renderSetup() {
  const c = state.config;
  const p = state.participantes;
  const totalPrem = c.premiadosFecha1 + c.premiadosFecha2;
  const faltan = Math.max(0, totalPrem - p.length);
  const cG = p.filter(x => x.tipo === 'grupo').length;
  const cI = p.filter(x => x.tipo === 'individual').length;

  return `
  <div class="min-h-screen flex flex-col">
    <header class="relative pt-6 pb-4 px-4 text-center">
      <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(to bottom,rgba(212,168,67,0.03),transparent)"></div>
      <div class="relative z-10 animate-fadeUp">
        <div class="flex justify-center mb-3"><i class="fas fa-trophy text-5xl text-amber-400 trophy-shine"></i></div>
        <h1 class="font-cinzel text-3xl md:text-4xl font-bold golden-text mb-1">Sorteo de Triunfo</h1>
        <p class="text-amber-200/50 text-sm tracking-wide mb-4">Dos fechas. Un solo destino de gloria.</p>
        ${(p.length > 0 || c.fecha1 || c.fecha2) ? `
        <button onclick="if(confirm('Estas seguro de limpiar TODOS los datos?')) clearAll()"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-red-500/30 bg-red-500/10 text-red-400/70 hover:bg-red-500/20 hover:text-red-300 text-xs transition-all">
          <i class="fas fa-eraser"></i> Limpiar Todo
        </button>` : ''}
      </div>
    </header>

    <main class="flex-grow px-4 pb-8 max-w-5xl mx-auto w-full">
      <div class="grid lg:grid-cols-5 gap-6">
        <!-- LEFT: Config + Entry -->
        <div class="lg:col-span-2 space-y-4 animate-fadeUp" style="animation-delay:0.15s">

          <!-- CONFIG -->
          <div class="glass p-5">
            <button onclick="setShowConfig(${!state.showConfig})" class="w-full flex items-center justify-between mb-3">
              <h2 class="font-cinzel text-sm font-semibold text-amber-300 flex items-center gap-2"><i class="fas fa-cog"></i> Configuracion del Sorteo</h2>
              <i class="fas fa-chevron-down text-amber-400/50 text-xs transition-transform" style="transform:rotate(${state.showConfig ? '180deg' : '0deg'})"></i>
            </button>
            ${state.showConfig ? `
            <div class="space-y-3">
              <!-- Fecha 1 -->
              <div class="bg-amber-500/5 border border-amber-500/10 rounded-xl p-4">
                <div class="flex items-center gap-2 mb-3">
                  <span class="w-6 h-6 rounded-full bg-amber-500/20 text-amber-400 text-xs flex items-center justify-center font-bold border border-amber-500/30 font-cinzel">1</span>
                  <h3 class="text-sm font-semibold text-amber-300">Fecha de Presentacion 1</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div><label class="text-[10px] text-amber-200/50 mb-1 block">Fecha</label>
                    <input type="date" value="${c.fecha1}" onchange="updateConfig({fecha1:this.value})"
                      class="w-full h-9 px-3 bg-black/30 border border-amber-500/20 rounded-lg text-amber-50 text-xs focus:border-amber-400 outline-none"></div>
                  <div><label class="text-[10px] text-amber-200/50 mb-1 block">Premiados</label>
                    <input type="number" min="1" max="50" value="${c.premiadosFecha1}" onchange="updateConfig({premiadosFecha1:parseInt(this.value)||1})"
                      class="w-full h-9 px-3 bg-black/30 border border-amber-500/20 rounded-lg text-amber-50 text-xs focus:border-amber-400 outline-none"></div>
                </div>
              </div>
              <!-- Fecha 2 -->
              <div class="bg-amber-500/5 border border-amber-500/10 rounded-xl p-4">
                <div class="flex items-center gap-2 mb-3">
                  <span class="w-6 h-6 rounded-full bg-amber-500/20 text-amber-400 text-xs flex items-center justify-center font-bold border border-amber-500/30 font-cinzel">2</span>
                  <h3 class="text-sm font-semibold text-amber-300">Fecha de Presentacion 2</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div><label class="text-[10px] text-amber-200/50 mb-1 block">Fecha</label>
                    <input type="date" value="${c.fecha2}" onchange="updateConfig({fecha2:this.value})"
                      class="w-full h-9 px-3 bg-black/30 border border-amber-500/20 rounded-lg text-amber-50 text-xs focus:border-amber-400 outline-none"></div>
                  <div><label class="text-[10px] text-amber-200/50 mb-1 block">Premiados</label>
                    <input type="number" min="1" max="50" value="${c.premiadosFecha2}" onchange="updateConfig({premiadosFecha2:parseInt(this.value)||1})"
                      class="w-full h-9 px-3 bg-black/30 border border-amber-500/20 rounded-lg text-amber-50 text-xs focus:border-amber-400 outline-none"></div>
                </div>
              </div>
              <!-- Tiempo -->
              <div><label class="text-[10px] text-amber-200/50 mb-1 block flex items-center gap-1"><i class="fas fa-clock text-[10px]"></i> Tiempo por presentacion (min)</label>
                <input type="number" min="1" max="120" value="${c.tiempoPorPresentacion}" onchange="updateConfig({tiempoPorPresentacion:parseInt(this.value)||10})"
                  class="w-full h-9 px-3 bg-black/30 border border-amber-500/20 rounded-lg text-amber-50 text-xs focus:border-amber-400 outline-none"></div>
              <!-- Summary -->
              <div class="flex items-center justify-between text-xs bg-black/20 rounded-lg p-3 border border-amber-500/10">
                <span class="text-amber-200/50">Total premiados: <span class="text-amber-400 font-bold">${totalPrem}</span></span>
                ${faltan > 0 ? `<span class="text-red-400 text-[10px]">Faltan ${faltan} participantes</span>` : (p.length > 0 ? `<span class="text-green-400 text-[10px]">Listo para sortear</span>` : '')}
              </div>
            </div>` : ''}

          <!-- ADD PARTICIPANTS -->

            <div class="flex bg-black/30 rounded-xl p-1 mb-4 border border-amber-500/10">

            <div class="space-y-3">
              <div class="flex gap-2">
                <button onclick="state.tipo='individual';render()" class="flex-1 py-2 rounded-lg text-xs border transition-all flex items-center justify-center gap-1 ${state.tipo==='individual'?'border-amber-400/50 bg-amber-500/15 text-amber-300':'border-amber-500/10 bg-black/20 text-amber-200/40'}">
                  <i class="fas fa-user"></i> Individual

                <button onclick="state.tipo='grupo';render()" class="flex-1 py-2 rounded-lg text-xs border transition-all flex items-center justify-center gap-1 ${state.tipo==='grupo'?'border-amber-400/50 bg-amber-500/15 text-amber-300':'border-amber-500/10 bg-black/20 text-amber-200/40'}">

                </button>
              </div>
              <input type="text" placeholder="${state.tipo==='grupo'?'Nombre del Grupo':'Nombre completo'}" value="${state.nombre}"

              <button onclick="addIndividual()" class="w-full py-3 bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 border border-amber-500/30 hover:border-amber-400/50 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <i class="fas fa-user-plus"></i> Agregar ${state.tipo==='grupo'?'Grupo':'Participante'}
              </button>
            </div>` : `
            <div class="space-y-3">
              <div class="flex gap-2">
                <button onclick="state.bulkTipo='individual';render()" class="flex-1 py-2 rounded-lg text-xs border transition-all flex items-center justify-center gap-1 ${state.bulkTipo==='individual'?'border-amber-400/50 bg-amber-500/15 text-amber-300':'border-amber-500/10 bg-black/20 text-amber-200/40'}">
                  <i class="fas fa-user"></i> Individuales
                </button>
                <button onclick="state.bulkTipo='grupo';render()" class="flex-1 py-2 rounded-lg text-xs border transition-all flex items-center justify-center gap-1 ${state.bulkTipo==='grupo'?'border-amber-400/50 bg-amber-500/15 text-amber-300':'border-amber-500/10 bg-black/20 text-amber-200/40'}">
                  <i class="fas fa-users"></i> Grupos
                </button>
              </div>
              <div>
                <div class="flex justify-between mb-1">
                  <label class="text-[10px] text-amber-200/60">Nombres (uno por linea o separados por coma)</label>
                  <span class="text-[10px] text-amber-500/50" id="bulkCount">0 detectados</span>
                </div>
                <textarea id="bulkArea" rows="7" placeholder="Ejemplo:\nMaria Gonzalez\nCarlos Perez\nAna Torres\n\nO separados por coma:\nMaria, Carlos, Ana, Pedro, Luisa"
                  oninput="state.bulkText=this.value;state.error='';document.getElementById('bulkCount').textContent=parseBulkNames(this.value).length+' detectados'"
                  class="w-full p-3 bg-black/30 border border-amber-500/20 rounded-xl text-amber-50 placeholder-amber-200/25 focus:border-amber-400 outline-none resize-none text-sm leading-relaxed">${state.bulkText}</textarea>
                <p class="text-[10px] text-amber-200/30 mt-1.5"><i class="fas fa-info-circle mr-1"></i>Escribe cada nombre en una linea nueva, o separalos con comas.</p>
              </div>
              <button onclick="addBulk()" class="w-full py-3 bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 border border-amber-500/30 hover:border-amber-400/50 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <i class="fas fa-users"></i> Agregar Participantes
              </button>
            </div>`}
          </div>
        </div>

        <!-- RIGHT: Participant List -->
        <div class="lg:col-span-3 animate-fadeUp" style="animation-delay:0.25s">
          <div class="glass p-5 min-h-[500px]">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
              <h2 class="font-cinzel text-lg font-semibold text-amber-300 flex items-center gap-2"><i class="fas fa-users"></i> Participantes</h2>
              <div class="flex gap-2">
                ${cI > 0 ? `<span class="text-xs bg-blue-500/10 text-blue-300 px-2.5 py-1 rounded-full border border-blue-500/20 flex items-center gap-1"><i class="fas fa-user"></i>${cI}</span>` : ''}
                ${cG > 0 ? `<span class="text-xs bg-amber-500/10 text-amber-300 px-2.5 py-1 rounded-full border border-amber-500/20 flex items-center gap-1"><i class="fas fa-users"></i>${cG}</span>` : ''}
                <span class="text-xs bg-amber-500/20 text-amber-400 px-2.5 py-1 rounded-full border border-amber-500/30 font-semibold">Total: ${p.length}</span>
              </div>
            </div>

            ${p.length === 0 ? `
            <div class="flex flex-col items-center justify-center py-20 text-amber-200/25">
              <i class="fas fa-users text-6xl mb-4"></i>
              <p class="text-sm">No hay participantes aun</p>
              <p class="text-xs mt-1 max-w-xs text-center">Agrega participantes individuales o pega una lista completa</p>
            </div>` : `
            <div class="space-y-2 max-h-[400px] overflow-y-auto pr-1">
              ${p.map((part, idx) => `
              <div class="bg-black/20 border border-amber-500/10 rounded-xl p-3 hover:border-amber-500/25 transition-colors group flex items-center justify-between gap-3">
                <div class="flex items-center gap-3 min-w-0 flex-grow">
                  <span class="text-xs font-cinzel text-amber-500/50 w-6 text-center flex-shrink-0">#${idx+1}</span>
                  <div class="min-w-0 flex-grow">
                    <div class="flex items-center gap-2">
                      <h3 class="font-semibold text-amber-100 text-sm truncate">${part.nombre}</h3>
                      <span class="text-[10px] px-1.5 py-0.5 rounded border flex-shrink-0 ${part.tipo==='grupo'?'bg-amber-600/20 text-amber-300 border-amber-600/30':'bg-blue-500/10 text-blue-300 border-blue-500/20'}">${part.tipo==='grupo'?'Grupo':'Individual'}</span>
                    </div>
                  </div>
                </div>
                <button onclick="removeParticipant('${part.id}')" class="text-red-400/30 hover:text-red-400 hover:bg-red-500/10 p-1.5 rounded-lg transition-all opacity-0 group-hover:opacity-100 flex-shrink-0">
                  <i class="fas fa-trash text-sm"></i>
                </button>
              </div>`).join('')}
            </div>`}

            ${p.length >= totalPrem && totalPrem >= 2 ? `
            <div class="mt-5 pt-4 border-t border-amber-500/10 animate-fadeUp">
              <div class="flex items-center justify-between text-xs text-amber-200/40 mb-3 px-1">
                <span>${c.premiadosFecha1} premiados Fecha 1 + ${c.premiadosFecha2} premiados Fecha 2</span>
                <span class="text-green-400">Listo para sortear</span>
              </div>
              <button onclick="iniciarSorteo()" class="btn-3d">
                <i class="fas fa-wand-magic-sparkles mr-2"></i> INICIAR SORTEO <i class="fas fa-chevron-right ml-2"></i>
              </button>
            </div>` : ''}
          </div>
        </div>
      </div>
    </main>
  </div>`;
}

function renderSorting() {
  const msgs = [
    'Reuniendo la energia del esfuerzo...','Cargando determinacion y pasion...',
    'Los suenos estan a punto de ordenarse...','La gloria espera a los valientes...',
    'Cada esfuerzo sera reconocido...','El destino se entrelaza con el trabajo...',
    'Preparando el escenario del triunfo...','Mezclando corazones y esperanzas...'
  ];
  return `
  <div class="min-h-screen flex flex-col items-center justify-center px-4 relative">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-500/5 rounded-full blur-3xl animate-pulse"></div>
    <div class="relative z-10 text-center max-w-md w-full">
      <div class="animate-spin-slow mb-8 inline-block"><i class="fas fa-trophy text-6xl text-amber-400" style="filter:drop-shadow(0 0 20px rgba(212,168,67,0.5))"></i></div>
      <h2 class="font-cinzel text-2xl font-bold golden-text mb-2">Definiendo el Orden del Triunfo</h2>
      <p class="text-amber-200/40 text-sm mb-8 h-5" id="sortMsg">${msgs[0]}</p>
      <div class="w-full bg-amber-500/10 rounded-full h-2 overflow-hidden border border-amber-500/10">
        <div class="h-full rounded-full" style="background:linear-gradient(to right,#d4a843,#b8892a);width:0%;animation:progressFill 3.8s linear forwards"></div>
      </div>
      <p class="text-xs text-amber-200/30 mt-2">100%</p>
    </div>
    <script>
      (function(){const m=${JSON.stringify(msgs)};let i=0;setInterval(()=>{const el=document.getElementById('sortMsg');if(el){i=(i+1)%m.length;el.textContent=m[i];}},500);})();
    <\/script>
  </div>`;
}

function renderReveal() {
  const g = getCurrentGanador();
  if (!g) return '';
  const ganadores = state.revealFecha === 1 ? state.f1Ganadores : state.f2Ganadores;
  const isTop3 = g.posicion <= 3;
  const isGrupo = g.participante.tipo === 'grupo';
  const isLast = state.revealIdx === ganadores.length - 1;
  const hasNextFecha = state.revealFecha === 1 && state.f2Ganadores.length > 0;
  const fechaLabel = state.revealFecha === 1 ? state.config.fecha1 : state.config.fecha2;
  const posIcons = ['fa-crown','fa-trophy','fa-award','fa-star','fa-sparkles'];
  const posColors = ['text-amber-300','text-gray-300','text-amber-500','text-amber-400/70','text-amber-400/50'];
  const posBgs = ['bg-amber-500/30 border-amber-400','bg-gray-400/15 border-gray-400','bg-amber-700/25 border-amber-600','bg-amber-500/10 border-amber-500/20','bg-amber-500/10 border-amber-500/20'];
  const pi = Math.min(g.posicion - 1, 4);

  return `
  <div class="min-h-screen flex flex-col items-center justify-center px-4 relative spot-bg">
    ${state.isRevealed ? '<div class="cam-flash"></div>' : ''}
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-500/5 rounded-full blur-3xl"></div>

    <button onclick="skipToResults()" class="absolute top-4 right-4 text-amber-200/30 hover:text-amber-200/60 transition-colors z-30 flex items-center gap-1 text-xs">
      <i class="fas fa-forward"></i> Saltar al resumen
    </button>
    <div class="absolute top-4 left-4 text-amber-200/40 text-xs z-30 flex items-center gap-2">
      <span class="bg-amber-500/10 px-2 py-1 rounded-full border border-amber-500/20 font-cinzel">Fecha ${state.revealFecha}</span>
      <span>${state.revealIdx + 1} / ${ganadores.length}</span>
    </div>

    <div class="relative z-20 text-center w-full max-w-lg animate-fadeUp">
      <!-- Fecha badge -->
      <div class="mb-4">
        <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-cinzel border bg-black/30 border-amber-500/20 text-amber-300">
          <i class="fas fa-calendar"></i> Fecha de Presentacion ${state.revealFecha}
        </span>
      </div>

      <!-- ═══ REVELACION MISTERIOSA ═══ -->
      <div class="reveal-wrap mx-auto ${state.isRevealed ? 'revealed' : ''}" onclick="reveal()">

        <!-- COVER -->
        <div class="reveal-cover">
          <div class="relative z-10">
            <div class="mb-4"><i class="fas fa-question-circle text-6xl text-amber-400/50 mystery-bounce"></i></div>
            <div class="inline-block px-4 py-2 rounded-full text-sm font-cinzel font-bold mb-3" style="background:linear-gradient(to right,${state.revealFecha===1?'#d4a843,#b8892a':'#8b6914,#d4a843'});color:#1a1410;">
              ${g.orderLabel}
            </div>
            <h3 class="font-cinzel text-xl text-amber-100/80 mb-2">Quien sera...</h3>
            <p class="text-amber-200/40 text-xs mb-6">Toca la carta para descubrir al premiado</p>
            <div class="flex items-center gap-2 justify-center text-amber-400/40">
              <i class="fas fa-eye"></i>
              <span class="text-[10px] tracking-[3px] uppercase animate-pulse">Toca para revelar</span>
            </div>
          </div>
        </div>

        <!-- PRIZE -->
        <div class="reveal-prize">
          <!-- Position -->
          <div class="mb-3 ${state.isRevealed ? 'animate-count' : 'opacity-0'}">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full ${posBgs[pi]}">
              <i class="fas ${posIcons[pi]} text-2xl ${posColors[pi]}"></i>
            </div>
          </div>

          <!-- Tipo -->
          <div class="mb-2 ${state.isRevealed ? 'animate-fadeUp' : 'opacity-0'}" style="animation-delay:0.2s">
            <span class="inline-flex items-center gap-1.5 text-[10px] px-2.5 py-0.5 rounded-full border ${isGrupo?'bg-amber-600/20 text-amber-300 border-amber-600/30':'bg-blue-500/10 text-blue-300 border-blue-500/20'}">
              <i class="fas ${isGrupo?'fa-users':'fa-user'} text-[10px]"></i> ${isGrupo?'Grupo de Trabajo':'Participante Individual'}
            </span>
          </div>

          <!-- Name -->
          <h2 class="font-cinzel text-2xl md:text-4xl font-bold golden-text mb-2 ${state.isRevealed ? 'animate-fadeUp' : 'opacity-0'}" style="animation-delay:0.3s">
            ${g.participante.nombre}
          </h2>

          <!-- Quote -->
          <p class="text-amber-200/50 text-xs italic mb-4 ${state.isRevealed ? 'animate-fadeUp' : 'opacity-0'}" style="animation-delay:0.45s">
            ${getQuote(g.posicion, ganadores.length)}
          </p>

          <!-- Details with glow for top 3 -->
          <div class="glow-box ${isTop3 && state.isRevealed ? 'active' : ''} ${state.isRevealed ? 'animate-fadeUp' : 'opacity-0'}" style="animation-delay:0.5s">
            <div class="flex flex-wrap justify-center gap-3 text-xs">
              <span class="flex items-center gap-1.5 text-amber-200/70"><i class="fas fa-calendar text-amber-400 text-[10px]"></i>${formatFechaFull(fechaLabel)}</span>
              <span class="flex items-center gap-1.5 text-amber-200/70"><i class="fas fa-clock text-amber-400 text-[10px]"></i>${state.config.tiempoPorPresentacion} minutos</span>
            </div>
          </div>
        </div>
      </div>

      <!-- BOTON 3D TACTIL - Siguiente -->
      <div class="mt-8 ${state.isRevealed ? 'animate-fadeUp' : 'opacity-0 pointer-events-none'}" style="animation-delay:0.3s">
        <button onclick="nextReveal()" class="btn-3d btn-3d-sm">
          ${isLast && hasNextFecha ? '<i class="fas fa-sparkles mr-2"></i>Siguiente Fecha<i class="fas fa-chevron-right ml-2"></i>' :
            isLast && !hasNextFecha ? '<i class="fas fa-trophy mr-2"></i>Ver Resultados Finales' :
            '<i class="fas fa-sparkles mr-2"></i>Siguiente Premiado<i class="fas fa-chevron-right ml-2"></i>'}
        </button>
        ${isTop3 ? `<p class="text-amber-400/40 text-[10px] font-cinzel tracking-wider mt-3 animate-fadeUp" style="animation-delay:0.5s"><i class="fas fa-sparkles mr-1"></i>${g.posicion===1?'Gloria al primer lugar':g.posicion===2?'Honor al segundo lugar':'Reconocimiento al tercer lugar'}</p>` : ''}
      </div>

      ${!state.isRevealed ? `<p class="text-amber-200/30 text-xs mt-6 animate-pulse">Toca la carta misteriosa para revelar...</p>` : ''}
    </div>
  </div>`;
}

function renderResults() {
  const c = state.config;
  const f1 = state.f1Ganadores;
  const f2 = state.f2Ganadores;
  const all = [...f1, ...f2];
  const tiempoTotal = all.length * c.tiempoPorPresentacion;
  const countGrupos = all.filter(g => g.participante.tipo === 'grupo').length;
  const countInd = all.filter(g => g.participante.tipo === 'individual').length;

  const posIcons = ['fa-crown','fa-trophy','fa-award','fa-star','fa-sparkles'];
  const posBadges = ['bg-amber-400 text-black','bg-gray-300 text-black','bg-amber-600 text-white','bg-amber-500/20 text-amber-400 border border-amber-500/20','bg-amber-500/20 text-amber-400 border border-amber-500/20'];
  const posTextColors = ['text-amber-300','text-gray-300','text-amber-500','text-amber-200/60','text-amber-200/60'];

  function renderGanadorList(ganadores, fechaNum, fechaStr) {
    return `
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-4 px-1">
        <div class="w-8 h-8 rounded-full bg-amber-500/20 border border-amber-500/30 flex items-center justify-center text-amber-400 font-cinzel font-bold text-sm">${fechaNum}</div>
        <div>
          <h3 class="font-cinzel text-sm font-semibold text-amber-300">Fecha de Presentacion ${fechaNum}</h3>
          <p class="text-[10px] text-amber-200/40"><i class="fas fa-calendar text-[9px]"></i> ${formatFechaFull(fechaStr)} &middot; ${c.tiempoPorPresentacion}min c/u</p>
        </div>
        <div class="ml-auto"><span class="text-xs bg-amber-500/10 text-amber-400 px-3 py-1 rounded-full border border-amber-500/20 font-semibold">${ganadores.length} premiados</span></div>
      </div>
      <div class="space-y-3">
        ${ganadores.map((g, i) => {
          const badge = i < 3 ? posBadges[i] : posBadges[3];
          const icon = i < 3 ? posIcons[i] : '';
          const isGrupo = g.participante.tipo === 'grupo';
          return `
          <div class="relative rounded-2xl border overflow-hidden ${i<3?(i===0?'bg-amber-500/20 border-amber-400/40':i===1?'bg-gray-400/10 border-gray-400/30':'bg-amber-700/15 border-amber-600/30'):'bg-black/20 border-amber-500/10'} animate-slideInLeft" style="animation-delay:${i*0.1}s">
            <div class="absolute top-4 left-4 w-10 h-10 rounded-full flex items-center justify-center font-cinzel font-bold text-sm ${badge}">
              ${i < 3 ? `<i class="fas ${icon}"></i>` : i+1}
            </div>
            <div class="p-5 pl-16">
              <div class="flex items-center gap-2 mb-1 flex-wrap">
                <span class="text-xs font-cinzel font-semibold ${posTextColors[Math.min(i,4)]}">${g.orderLabel}</span>
                <span class="text-[10px] px-1.5 py-0.5 rounded border ${isGrupo?'bg-amber-600/20 text-amber-300 border-amber-600/30':'bg-blue-500/10 text-blue-300 border-blue-500/20'}">${isGrupo?'Grupo':'Individual'}</span>
                ${i===0 ? '<i class="fas fa-sparkles text-amber-400 text-xs"></i>' : ''}
              </div>
              <h3 class="font-cinzel text-lg font-bold mb-2 ${i===0?'golden-text':'text-amber-100'}">${g.participante.nombre}</h3>
              <span class="text-[11px] flex items-center gap-1.5 bg-black/30 text-amber-200/60 px-2.5 py-1 rounded-md border border-amber-500/10 inline-flex">
                <i class="fas fa-clock text-amber-400 text-[10px]"></i>${c.tiempoPorPresentacion} minutos
              </span>
            </div>
            ${i<3 ? `<div class="h-1 bg-gradient-to-r ${i===0?'from-amber-400/20 to-amber-600/10':i===1?'from-gray-400/10 to-gray-500/5':'from-amber-600/10 to-amber-700/5'}"></div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return `
  <div class="min-h-screen flex flex-col">
    <header class="pt-6 pb-4 px-4 text-center relative">
      <div class="animate-fadeUp">
        <div class="flex justify-center mb-3"><i class="fas fa-trophy text-5xl text-amber-400 trophy-shine"></i></div>
        <h1 class="font-cinzel text-3xl md:text-4xl font-bold golden-text mb-2">Resultados del Sorteo</h1>
        <p class="text-amber-200/50 text-sm">Orden de presentacion para ambas fechas</p>
      </div>
    </header>

    <main class="flex-grow px-4 pb-8 max-w-2xl mx-auto w-full">
      <!-- Stats -->
      <div class="flex flex-wrap justify-center gap-3 mb-6 animate-fadeUp" style="animation-delay:0.1s">
        <div class="bg-black/20 border border-amber-500/10 rounded-lg px-4 py-2 text-center">
          <p class="text-lg font-bold text-amber-400">${all.length}</p><p class="text-[10px] text-amber-200/40 uppercase tracking-wider">Premiados</p>
        </div>
        <div class="bg-black/20 border border-amber-500/10 rounded-lg px-4 py-2 text-center">
          <p class="text-lg font-bold text-amber-400">${f1.length} + ${f2.length}</p><p class="text-[10px] text-amber-200/40 uppercase tracking-wider">Fecha 1 + Fecha 2</p>
        </div>
        ${countInd > 0 ? `<div class="bg-black/20 border border-blue-500/10 rounded-lg px-4 py-2 text-center"><p class="text-lg font-bold text-blue-400">${countInd}</p><p class="text-[10px] text-blue-200/40 uppercase tracking-wider">Individuales</p></div>` : ''}
        ${countGrupos > 0 ? `<div class="bg-black/20 border border-amber-600/20 rounded-lg px-4 py-2 text-center"><p class="text-lg font-bold text-amber-500">${countGrupos}</p><p class="text-[10px] text-amber-200/40 uppercase tracking-wider">Grupos</p></div>` : ''}
        <div class="bg-black/20 border border-amber-500/10 rounded-lg px-4 py-2 text-center">
          <p class="text-lg font-bold text-amber-400">${tiempoTotal}m</p><p class="text-[10px] text-amber-200/40 uppercase tracking-wider">Duracion total</p>
        </div>
      </div>

      <!-- Fecha 1 -->
      ${f1.length > 0 ? renderGanadorList(f1, 1, c.fecha1) : ''}

      <!-- Separator -->
      ${f1.length > 0 && f2.length > 0 ? `
      <div class="flex items-center gap-4 my-8">
        <div class="flex-1 h-px bg-amber-500/10"></div>
        <div class="w-10 h-10 rounded-full bg-amber-500/10 border border-amber-500/20 flex items-center justify-center"><i class="fas fa-chevron-right text-amber-400/60"></i></div>
        <div class="flex-1 h-px bg-amber-500/10"></div>
      </div>` : ''}

      <!-- Fecha 2 -->
      ${f2.length > 0 ? renderGanadorList(f2, 2, c.fecha2) : ''}

      <!-- Timeline -->
      <div class="mt-8 glass p-5 animate-fadeUp" style="animation-delay:0.6s">
        <h3 class="font-cinzel text-sm font-semibold text-amber-300 mb-4 flex items-center gap-2"><i class="fas fa-timeline"></i> Resumen del Cronograma</h3>
        <div class="mb-4">
          <p class="text-[10px] text-amber-400/60 mb-2 font-cinzel">Fecha 1 &middot; ${formatFechaFull(c.fecha1)}</p>
          <div class="flex gap-2 overflow-x-auto pb-2">
            ${f1.map((g,i) => `<div class="flex items-center gap-1.5 flex-shrink-0"><div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold ${i===0?'bg-amber-400 text-black':i===1?'bg-gray-300 text-black':i===2?'bg-amber-600 text-white':'bg-amber-500/15 text-amber-400 border border-amber-500/20'}">${i+1}</div><span class="text-[10px] text-amber-200/50 max-w-[60px] truncate">${g.participante.nombre.split(' ')[0]}</span>${i<f1.length-1?'<div class="w-3 h-px bg-amber-500/15"></div>':''}</div>`).join('')}
          </div>
        </div>
        <div>
          <p class="text-[10px] text-amber-400/60 mb-2 font-cinzel">Fecha 2 &middot; ${formatFechaFull(c.fecha2)}</p>
          <div class="flex gap-2 overflow-x-auto pb-2">
            ${f2.map((g,i) => `<div class="flex items-center gap-1.5 flex-shrink-0"><div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold ${i===0?'bg-amber-400 text-black':i===1?'bg-gray-300 text-black':i===2?'bg-amber-600 text-white':'bg-amber-500/15 text-amber-400 border border-amber-500/20'}">${i+1}</div><span class="text-[10px] text-amber-200/50 max-w-[60px] truncate">${g.participante.nombre.split(' ')[0]}</span>${i<f2.length-1?'<div class="w-3 h-px bg-amber-500/15"></div>':''}</div>`).join('')}
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="mt-6 flex flex-col gap-3 animate-fadeUp" style="animation-delay:0.8s">
        <button onclick="exportPDF()" class="btn-3d">
          <i class="fas fa-file-pdf mr-2"></i> Generar PDF para Imprimir <i class="fas fa-print ml-2"></i>
        </button>
        <button onclick="reset()" class="w-full py-3 border border-amber-500/30 text-amber-300 hover:bg-amber-500/10 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
          <i class="fas fa-rotate-left"></i> Nuevo Sorteo
        </button>
        <p class="text-center text-xs text-amber-200/30 mt-2 pb-8">
          <button onclick="if(confirm('Limpiar TODO?'))clearAll()" class="hover:text-amber-200/50 transition-colors underline">Comenzar desde cero</button>
        </p>
      </div>
    </main>
  </div>`;
}

function getQuote(pos, total) {
  if (pos === 1) return '"El esfuerzo constante forja la gloria eterna"';
  if (pos === 2) return '"La perseverancia es el camino hacia la excelencia"';
  if (pos === 3) return '"Cada paso adelante es una victoria sobre uno mismo"';
  if (pos === total) return '"El cierre es solo el comienzo de una nueva era"';
  return '"El trabajo duro siempre encuentra su reconocimiento"';
}

function parseBulkNames(text) {
  const lines = text.split('\n');
  const names = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (t.includes(',')) names.push(...t.split(',').map(s => s.trim()).filter(s => s));
    else names.push(t);
  }
  return names.filter(n => n.length > 0);
}

// ═══════════════════════════════════════════════════
//  PDF EXPORT
// ═══════════════════════════════════════════════════
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 18;
  const c = state.config;
  const f1 = state.f1Ganadores;
  const f2 = state.f2Ganadores;
  const all = [...f1, ...f2];

  // Header
  doc.setFillColor(20, 14, 8);
  doc.rect(0, 0, W, 42, 'F');
  doc.setDrawColor(212, 168, 67);
  doc.setLineWidth(1);
  doc.line(M, 42, W - M, 42);
  doc.setTextColor(212, 168, 67);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('ORDEN DE PRESENTACION', W / 2, 16, { align: 'center' });
  doc.setTextColor(220, 200, 160);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text('Sorteo de Triunfo, Gloria y Esfuerzo', W / 2, 24, { align: 'center' });
  const now = new Date();
  doc.setTextColor(160, 140, 100);
  doc.setFontSize(6.5);
  doc.text('Fecha del sorteo: ' + now.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }), W / 2, 34, { align: 'center' });

  // Summary
  let y = 50;
  doc.setFillColor(250, 247, 240);
  doc.setDrawColor(212, 168, 67);
  doc.roundedRect(M, y, W - M * 2, 16, 2, 2, 'FD');
  doc.setTextColor(100, 80, 50);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'bold');
  doc.text('Fecha 1: ' + c.fecha1 + '  |  ' + f1.length + ' premiados', M + 4, y + 6);
  doc.text('Fecha 2: ' + c.fecha2 + '  |  ' + f2.length + ' premiados', M + 4, y + 12);
  doc.text('Total: ' + all.length + '  |  Tiempo: ' + (all.length * c.tiempoPorPresentacion) + ' min', W - M - 4, y + 9, { align: 'right' });

  y = 72;

  // Fecha 1 table
  if (f1.length > 0) {
    doc.setTextColor(212, 168, 67);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('FECHA 1 - ' + c.fecha1, M, y);
    doc.autoTable({
      startY: y + 4, head: [['#', 'Nombre / Grupo', 'Tipo', 'Tiempo', 'Orden']],
      body: f1.map((g, i) => [`${i + 1}`, g.participante.nombre, g.participante.tipo === 'grupo' ? 'Grupo' : 'Individual', c.tiempoPorPresentacion + ' min', g.orderLabel]),
      theme: 'plain',
      headStyles: { fillColor: [25, 18, 10], textColor: [212, 168, 67], fontStyle: 'bold', fontSize: 7.5, halign: 'center', cellPadding: 3 },
      bodyStyles: { fontSize: 7.5, cellPadding: 3.5, textColor: [40, 35, 30] },
      columnStyles: { 0: { halign: 'center', cellWidth: 10 }, 1: { fontStyle: 'bold' }, 2: { halign: 'center', cellWidth: 26 }, 3: { halign: 'center', cellWidth: 20 }, 4: { halign: 'center', fontStyle: 'italic' } },
      alternateRowStyles: { fillColor: [250, 247, 240] },
      margin: { left: M, right: M },
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  // Fecha 2 table
  if (f2.length > 0) {
    if (y > 240) { doc.addPage(); y = 18; }
    doc.setTextColor(212, 168, 67);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('FECHA 2 - ' + c.fecha2, M, y);
    doc.autoTable({
      startY: y + 4, head: [['#', 'Nombre / Grupo', 'Tipo', 'Tiempo', 'Orden']],
      body: f2.map((g, i) => [`${i + 1}`, g.participante.nombre, g.participante.tipo === 'grupo' ? 'Grupo' : 'Individual', c.tiempoPorPresentacion + ' min', g.orderLabel]),
      theme: 'plain',
      headStyles: { fillColor: [25, 18, 10], textColor: [212, 168, 67], fontStyle: 'bold', fontSize: 7.5, halign: 'center', cellPadding: 3 },
      bodyStyles: { fontSize: 7.5, cellPadding: 3.5, textColor: [40, 35, 30] },
      columnStyles: { 0: { halign: 'center', cellWidth: 10 }, 1: { fontStyle: 'bold' }, 2: { halign: 'center', cellWidth: 26 }, 3: { halign: 'center', cellWidth: 20 }, 4: { halign: 'center', fontStyle: 'italic' } },
      alternateRowStyles: { fillColor: [250, 247, 240] },
      margin: { left: M, right: M },
    });
  }

  // Footer
  const pages = doc.internal.pages.length;
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    const by = doc.internal.pageSize.getHeight() - 10;
    doc.setDrawColor(212, 168, 67);
    doc.setLineWidth(0.5);
    doc.line(M, by - 4, W - M, by - 4);
    doc.setTextColor(140, 130, 110);
    doc.setFontSize(6);
    doc.text('Sorteo de Triunfo y Gloria - Que el esfuerzo y la dedicacion brillen en cada presentacion', W / 2, by, { align: 'center' });
  }

  doc.save('sorteo-presentacion-' + new Date().toISOString().split('T')[0] + '.pdf');
}
